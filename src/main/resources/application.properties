spring.application.name=at-board
server.port=8090

# Primary DataSource - msgboard (게시판, 게시판 카테고리, 관리자)
spring.datasource.primary.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.primary.jdbc-url=jdbc:mariadb://localhost:3306/atboard
spring.datasource.primary.username=msger
spring.datasource.primary.password=msger

# Primary HikariCP 커넥션 풀
spring.datasource.primary.hikari.pool-name=PrimaryPool
spring.datasource.primary.hikari.maximum-pool-size=50
spring.datasource.primary.hikari.minimum-idle=5
spring.datasource.primary.hikari.connection-timeout=30000
spring.datasource.primary.hikari.idle-timeout=600000
spring.datasource.primary.hikari.max-lifetime=1800000

# Secondary DataSource - 사용자 데이터베이스 (MSG_USER, MSG_DEPT)
spring.datasource.secondary.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.secondary.jdbc-url=jdbc:mariadb://localhost:3306/msgadm
spring.datasource.secondary.username=msger
spring.datasource.secondary.password=msger

# Secondary HikariCP 커넥션 풀
spring.datasource.secondary.hikari.pool-name=SecondaryPool
spring.datasource.secondary.hikari.maximum-pool-size=20
spring.datasource.secondary.hikari.minimum-idle=3
spring.datasource.secondary.hikari.connection-timeout=30000
spring.datasource.secondary.hikari.idle-timeout=600000
spring.datasource.secondary.hikari.max-lifetime=1800000

# Primary DataSource Hibernate 설정
spring.jpa.primary.hibernate.ddl-auto=update
spring.jpa.primary.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.primary.hibernate.show-sql=false
spring.jpa.primary.hibernate.format-sql=false

# Secondary DataSource Hibernate 설정
spring.jpa.secondary.hibernate.ddl-auto=validate
spring.jpa.secondary.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.secondary.hibernate.show-sql=false
spring.jpa.secondary.hibernate.format-sql=false

# JPA open-in-view 비활성화
spring.jpa.open-in-view=false

# Jackson LocalDateTime을 ISO 문자열로 직렬화 (모바일 무한스크롤 API용)
spring.jackson.serialization.write-dates-as-timestamps=false

# 세션 설정
server.servlet.session.timeout=120m

# 로깅 설정
logging.config=classpath:logback-spring.xml

# 데이터베이스 테이블/컬럼 매핑 설정 (사용자 정의 가능)
# 사용자 테이블
database.table.user.name=MSG_USER
database.table.user.user-id=USER_ID
database.table.user.user-name=USER_NAME
database.table.user.pos-name=POS_NAME
database.table.user.dept-id=USER_HIGH
database.table.user.user-order=USER_ORDER

# 부서 테이블
database.table.dept.name=MSG_PART
database.table.dept.dept-id=PART_ID
database.table.dept.dept-name=PART_NAME
database.table.dept.parent-dept=PART_HIGH
database.table.dept.dept-order=PART_ORDER

# 스케줄러 설정
# 부서-게시판 동기화 스케줄 (cron: 초 분 시 일 월 요일)
# 기본값: 매시간 정각 (0 0 * * * *)
# 예시: 매일 오전 6시 = 0 0 6 * * *
# 예시: 매 10분마다 = 0 */10 * * * *
scheduler.department-sync.cron=0 0 * * * *

# 프로필 사진 URL 패턴 ({userId} 는 사용자 ID 로 치환, 비워두면 기능 비활성화)
profile.photo.url-pattern=http://125.131.105.208:18003/photo/{userId}

# 새글 알림 서버 설정 (none / fmc / msg) fmc 는 아직 안됨.
notification.server.type=msg
notification.fmc.url=
notification.msg.url=https://125.131.105.208:18010/noti
notification.msg.system-code=ATBOARD
# 알림 linkUrl에 사용할 게시판 서버 주소 (예: http://125.131.105.208:8090)
notification.server.base-url=http://125.131.105.208:8091
# 알림 linkUrl 사용 여부 (false면 빈 문자열로 전송)
notification.msg.link-url-enabled=true
# 사용자별 알림 전송 간 딜레이 (밀리초, 0이면 딜레이 없음)
notification.msg.request-delay-ms=100
# 알림 수신함 저장 여부
notification.msg.persistence=false
# HTTP 타임아웃 (밀리초)
notification.msg.connect-timeout-ms=5000
notification.msg.read-timeout-ms=10000

# 파일 업로드 설정
file.upload.path=uploads
file.upload.max-size=10485760
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=150MB

# 파일 스토리지 모드 설정
# local  : 로컬 디스크 저장 (업무망 또는 단독 배포, 기본값)
# remote : 업무망 게시판으로 프록시 저장 (인터넷망 배포 시 사용)
file.storage.mode=local

# remote 모드 전용 설정 (file.storage.mode=remote 일 때만 사용)
# 업무망 게시판 서버 주소 (예: http://192.168.1.10:8090)
file.storage.remote.base-url=
# 내부 API 인증 시크릿 (InternalFileController X-Internal-Secret 헤더, 비워두면 검사 안 함)
file.storage.remote.internal-secret=
# HTTP 타임아웃 (밀리초)
file.storage.remote.connect-timeout-ms=5000
file.storage.remote.read-timeout-ms=60000
