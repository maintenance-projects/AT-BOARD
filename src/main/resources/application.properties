spring.application.name=at-board
server.port=8090

# Primary DataSource - msgboard (게시판, 게시판 카테고리, 관리자)
spring.datasource.primary.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.primary.jdbc-url=jdbc:mariadb://localhost:3306/msgboard
spring.datasource.primary.username=msger
spring.datasource.primary.password=msger

# Secondary DataSource - 사용자 데이터베이스 (MSG_USER, MSG_DEPT)
spring.datasource.secondary.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.secondary.jdbc-url=jdbc:mariadb://localhost:3306/msgadm
spring.datasource.secondary.username=msger
spring.datasource.secondary.password=msger

# JPA 기본 설정 (기본 데이터소스에만 적용, 개별 설정은 아래 참조)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Primary DataSource Hibernate 설정
spring.jpa.primary.hibernate.ddl-auto=update
spring.jpa.primary.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.primary.hibernate.show-sql=true
spring.jpa.primary.hibernate.format-sql=true

# Secondary DataSource Hibernate 설정
spring.jpa.secondary.hibernate.ddl-auto=update
spring.jpa.secondary.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.secondary.hibernate.show-sql=true
spring.jpa.secondary.hibernate.format-sql=true

# 세션 설정
server.servlet.session.timeout=30m

# 로깅 설정
logging.config=classpath:logback-spring.xml

# 데이터베이스 테이블/컬럼 매핑 설정 (사용자 정의 가능)
# 사용자 테이블
database.table.user.name=MSG_USER
database.table.user.user-id=USER_ID
database.table.user.user-name=USER_NAME
database.table.user.pos-name=POS_NAME
database.table.user.dept-id=USER_HIGH

# 부서 테이블
database.table.dept.name=MSG_PART
database.table.dept.dept-id=PART_ID
database.table.dept.dept-name=PART_NAME

# 스케줄러 설정
# 부서-게시판 동기화 스케줄 (cron: 초 분 시 일 월 요일)
# 기본값: 매시간 정각 (0 0 * * * *)
# 예시: 매일 오전 6시 = 0 0 6 * * *
# 예시: 매 10분마다 = 0 */10 * * * *
scheduler.department-sync.cron=0 0 * * * *

# 파일 업로드 설정
file.upload.path=uploads
file.upload.max-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
