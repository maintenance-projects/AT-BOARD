<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f6f7fb;
            font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 52px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .code {
            font-size: 80px;
            font-weight: 800;
            color: #3b82f6;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 36px;
            word-break: keep-all;
        }
        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: #3b82f6;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }
        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            .code  { font-size: 60px; }
            .title { font-size: 18px; }
        }
        @media (prefers-color-scheme: dark) {
            body  { background: #111827; }
            .card { background: #1f2937; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); }
            .title { color: #f9fafb; }
            .desc  { color: #9ca3af; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h1 class="title">페이지를 찾을 수 없습니다</h1>
        <p class="desc">요청하신 페이지가 존재하지 않거나<br>이동되었을 수 있습니다.</p>
        <a href="/board" class="btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
