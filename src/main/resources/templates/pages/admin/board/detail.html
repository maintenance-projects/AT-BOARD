<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 상세 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
    <link rel="stylesheet" href="/pages/board/board.css" />
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/boards" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
                <a href="/admin/settings" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">⚙️</span>
                    환경설정
                </a>
                <div class="admin-sidebar__divider"></div>
                <span class="admin-sidebar__section-label">매뉴얼 다운로드</span>
                <a href="/core/guide/AT_BOARD_테이블정의서.xlsx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    테이블정의서
                </a>
                <a href="/core/guide/게시판_사용자_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    사용자 매뉴얼
                </a>
                <a href="/core/guide/관리자페이지_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    관리자 매뉴얼
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2>게시물 상세</h2>
                <div class="admin-header__actions">
                    <a th:href="@{/admin/boards(categoryId=${backCategoryId}, searchType=${backKeyword != null ? backSearchType : null}, keyword=${backKeyword})}" class="btn btn--secondary">목록으로</a>
                    <form th:action="@{/admin/boards/delete/{id}(id=${board.id})}" method="post" style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <button type="submit" class="btn btn--danger">삭제</button>
                    </form>
                </div>
            </div>

            <div class="admin-content">
                <div class="board-detail-card">
                    <div class="board-detail-header">
                        <h3 th:text="${board.title}">제목</h3>
                        <div class="board-detail-meta">
                            <span class="badge badge--secondary" th:text="${board.category != null ? board.category.name : '-'}">게시판</span>
                            <span th:text="${board.authorName}">작성자</span>
                            <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                            <span>조회 <span th:text="${board.viewCount}">0</span></span>
                        </div>
                    </div>
                    <div class="board-detail-content">
                        <div th:utext="${board.content}" class="board-detail-content__body">내용</div>
                    </div>
                    <div class="attachment-download-section" th:if="${attachments != null && !attachments.isEmpty()}">
                        <h4 class="attachment-download-section__title">첨부파일 <span th:text="${attachments.size()}">0</span>개</h4>
                        <ul class="attachment-download-list">
                            <li th:each="attachment : ${attachments}"
                                th:class="${attachment.isExpired()} ? 'attachment-download-item attachment-download-item--expired' : 'attachment-download-item'">
                                <span class="attachment-download-item__icon">📎</span>
                                <!-- 만료 전 -->
                                <a th:unless="${attachment.isExpired()}"
                                   th:href="@{/board/attachments/{id}/download(id=${attachment.id})}"
                                   class="attachment-download-item__name"
                                   th:text="${attachment.originalName}">파일명</a>
                                <!-- 만료 후 (파일 삭제됨) -->
                                <span th:if="${attachment.isExpired()}"
                                      class="attachment-download-item__name attachment-download-item__name--expired"
                                      th:text="${attachment.originalName}">파일명</span>
                                <span th:if="${attachment.isExpired()}" class="attachment-expired-badge">다운로드 기간 만료</span>
                                <th:block th:unless="${attachment.isExpired()}">
                                    <span class="attachment-download-item__size" th:text="${attachment.fileSizeDisplay}">크기</span>
                                    <span th:if="${attachment.expiresAt != null}" class="attachment-expiry-info"
                                          th:text="'~' + ${#temporals.format(attachment.expiresAt, 'yyyy-MM-dd')}">~2025-12-31</span>
                                </th:block>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 이미지 뷰어 -->
    <div id="imageViewer" class="img-viewer" style="display:none;" role="dialog" aria-modal="true">
        <button class="img-viewer__close" type="button" aria-label="닫기">&times;</button>
        <span class="img-viewer__counter" id="viewerCounter"></span>
        <button class="img-viewer__prev" type="button" aria-label="이전 이미지">&#10094;</button>
        <div class="img-viewer__main">
            <img id="viewerMainImg" class="img-viewer__main-img" src="" alt="이미지">
        </div>
        <button class="img-viewer__next" type="button" aria-label="다음 이미지">&#10095;</button>
        <div class="img-viewer__thumbs" id="viewerThumbs"></div>
    </div>

    <script src="/pages/admin/admin.js"></script>
    <script src="/pages/board/board.js"></script>
    <script>
        (function() {
            var viewer = document.getElementById('imageViewer');
            var mainImg = document.getElementById('viewerMainImg');
            var thumbsEl = document.getElementById('viewerThumbs');
            var counterEl = document.getElementById('viewerCounter');
            var prevBtn = viewer.querySelector('.img-viewer__prev');
            var nextBtn = viewer.querySelector('.img-viewer__next');

            var srcs = [];
            var current = 0;

            var contentImgs = Array.from(document.querySelectorAll('.board-detail-content__body img'));
            if (contentImgs.length === 0) return;

            contentImgs.forEach(function(img, i) {
                srcs.push(img.src);
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', function() { openViewer(i); });
            });

            if (srcs.length > 1) {
                srcs.forEach(function(src, i) {
                    var t = document.createElement('img');
                    t.src = src;
                    t.className = 'img-viewer__thumb';
                    t.alt = (i + 1) + '번 이미지';
                    t.addEventListener('click', function(e) {
                        e.stopPropagation();
                        current = i;
                        updateViewer();
                    });
                    thumbsEl.appendChild(t);
                });
            } else {
                thumbsEl.style.display = 'none';
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }

            function openViewer(index) {
                current = index;
                viewer.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                updateViewer();
            }

            function closeViewer() {
                viewer.style.display = 'none';
                document.body.style.overflow = '';
            }

            function prevImage() {
                current = (current - 1 + srcs.length) % srcs.length;
                updateViewer();
            }

            function nextImage() {
                current = (current + 1) % srcs.length;
                updateViewer();
            }

            function updateViewer() {
                mainImg.src = srcs[current];
                counterEl.textContent = srcs.length > 1 ? (current + 1) + ' / ' + srcs.length : '';
                var thumbs = thumbsEl.querySelectorAll('.img-viewer__thumb');
                thumbs.forEach(function(t, i) {
                    t.classList.toggle('img-viewer__thumb--active', i === current);
                });
                if (thumbs[current]) {
                    thumbs[current].scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
                }
            }

            viewer.querySelector('.img-viewer__close').addEventListener('click', closeViewer);
            prevBtn.addEventListener('click', function(e) { e.stopPropagation(); prevImage(); });
            nextBtn.addEventListener('click', function(e) { e.stopPropagation(); nextImage(); });

            viewer.addEventListener('click', function(e) {
                if (e.target === viewer || e.target === viewer.querySelector('.img-viewer__main')) {
                    closeViewer();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (viewer.style.display === 'none') return;
                if (e.key === 'ArrowLeft') prevImage();
                else if (e.key === 'ArrowRight') nextImage();
                else if (e.key === 'Escape') closeViewer();
            });

            var touchStartX = 0;
            viewer.querySelector('.img-viewer__main').addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
            }, { passive: true });
            viewer.querySelector('.img-viewer__main').addEventListener('touchend', function(e) {
                var dx = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(dx) > 50) {
                    if (dx < 0) nextImage(); else prevImage();
                }
            }, { passive: true });
        })();

        // 본문 이미지 로드 실패 시 대체 이미지
        handleBrokenImages('.board-detail-content__body');
    </script>
</body>
</html>
