<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 상세 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/boards" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2>게시물 상세</h2>
                <div class="admin-header__actions">
                    <a href="/admin/boards" class="btn btn--secondary">목록으로</a>
                    <form th:action="@{/admin/boards/delete/{id}(id=${board.id})}" method="post" style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <button type="submit" class="btn btn--danger">삭제</button>
                    </form>
                </div>
            </div>

            <div class="admin-content">
                <div class="board-detail-card">
                    <div class="board-detail-header">
                        <h3 th:text="${board.title}">제목</h3>
                        <div class="board-detail-meta">
                            <span class="badge badge--secondary" th:text="${board.category != null ? board.category.name : '-'}">게시판</span>
                            <span th:text="${board.authorName}">작성자</span>
                            <span th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                            <span>조회 <span th:text="${board.viewCount}">0</span></span>
                        </div>
                    </div>
                    <div class="board-detail-content">
                        <div th:utext="${board.content}" style="line-height: 1.8;">내용</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
</body>
</html>
