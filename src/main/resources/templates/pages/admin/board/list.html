<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 관리 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/boards" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2>게시물 관리</h2>
                <div class="admin-header__actions">
                    <a th:href="@{/admin/boards/write(categoryId=${categoryId})}" class="btn btn--primary">새 게시물 작성</a>
                </div>
            </div>

            <div class="admin-content">
                <!-- 검색바 -->
                <form class="admin-search-bar" action="/admin/boards" method="get">
                    <select name="categoryId" class="form-input admin-search-bar__select">
                        <option value="">전체 게시판</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${categoryId != null && categoryId == cat.id}">게시판</option>
                    </select>
                    <select name="searchType" class="form-input admin-search-bar__type">
                        <option value="all"     th:selected="${searchType == 'all'}">제목+내용</option>
                        <option value="title"   th:selected="${searchType == 'title'}">제목</option>
                        <option value="content" th:selected="${searchType == 'content'}">내용</option>
                        <option value="author"  th:selected="${searchType == 'author'}">작성자</option>
                    </select>
                    <input class="form-input admin-search-bar__input" type="text" name="keyword"
                           th:value="${keyword}" placeholder="검색어 입력" maxlength="100" />
                    <button type="submit" class="btn btn--primary">검색</button>
                    <a th:if="${(keyword != null && !#strings.isEmpty(keyword)) || categoryId != null}"
                       href="/admin/boards" class="btn btn--secondary">초기화</a>
                </form>

                <!-- 검색 결과 안내 -->
                <div th:if="${keyword != null && !#strings.isEmpty(keyword)}" class="admin-search-result">
                    "<span th:text="${keyword}"></span>" 검색 결과
                    <strong th:text="${boards.totalElements} + '건'"></strong>
                </div>

                <div th:if="${boards.totalElements == 0}" class="empty-state">
                    <p th:text="${keyword != null && !#strings.isEmpty(keyword)} ? '검색 결과가 없습니다.' : '등록된 게시물이 없습니다.'">등록된 게시물이 없습니다.</p>
                </div>

                <div th:unless="${boards.totalElements == 0}" class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>제목</th>
                                <th>작성자</th>
                                <th>게시판</th>
                                <th>작성일</th>
                                <th>조회수</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="board : ${boards.content}">
                                <td th:text="${board.id}">1</td>
                                <td>
                                    <a th:href="@{/admin/boards/{id}(id=${board.id})}" th:text="${board.title}" class="link">제목</a>
                                </td>
                                <td th:text="${board.authorName}">작성자</td>
                                <td><span class="badge badge--secondary" th:text="${board.category != null ? board.category.name : '-'}">게시판</span></td>
                                <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                <td th:text="${board.viewCount}">0</td>
                                <td>
                                    <form th:action="@{/admin/boards/delete/{id}(id=${board.id})}" method="post" style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                        <button type="submit" class="btn btn--sm btn--danger">삭제</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 -->
                <div class="admin-pagination" th:if="${boards.totalPages > 1}">
                    <a th:if="${boards.hasPrevious()}"
                       th:href="@{/admin/boards(page=${boards.number - 1}, categoryId=${categoryId}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                       class="btn btn--sm btn--secondary">&laquo;</a>
                    <span th:unless="${boards.hasPrevious()}" class="btn btn--sm btn--secondary admin-pagination__disabled">&laquo;</span>

                    <th:block th:with="startPage=${T(java.lang.Math).max(0, boards.number - 2)}, endPage=${T(java.lang.Math).min(boards.totalPages - 1, boards.number + 2)}">
                        <a th:if="${startPage > 0}"
                           th:href="@{/admin/boards(page=0, categoryId=${categoryId}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                           class="btn btn--sm btn--secondary">1</a>
                        <span th:if="${startPage > 1}" class="admin-pagination__ellipsis">…</span>

                        <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
                            <a th:if="${i != boards.number}"
                               th:href="@{/admin/boards(page=${i}, categoryId=${categoryId}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                               th:text="${i + 1}" class="btn btn--sm btn--secondary"></a>
                            <span th:if="${i == boards.number}"
                                  th:text="${i + 1}" class="btn btn--sm btn--primary"></span>
                        </th:block>

                        <span th:if="${endPage < boards.totalPages - 2}" class="admin-pagination__ellipsis">…</span>
                        <a th:if="${endPage < boards.totalPages - 1}"
                           th:href="@{/admin/boards(page=${boards.totalPages - 1}, categoryId=${categoryId}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                           th:text="${boards.totalPages}" class="btn btn--sm btn--secondary"></a>
                    </th:block>

                    <a th:if="${boards.hasNext()}"
                       th:href="@{/admin/boards(page=${boards.number + 1}, categoryId=${categoryId}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                       class="btn btn--sm btn--secondary">&raquo;</a>
                    <span th:unless="${boards.hasNext()}" class="btn btn--sm btn--secondary admin-pagination__disabled">&raquo;</span>
                </div>
            </div>
        </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
</body>
</html>
