<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시물 작성 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
    <link href="/vendor/quill/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/boards" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
                <a href="/admin/settings" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">⚙️</span>
                    환경설정
                </a>
                <div class="admin-sidebar__divider"></div>
                <span class="admin-sidebar__section-label">매뉴얼 다운로드</span>
                <a href="/core/guide/AT_BOARD_테이블정의서.xlsx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    테이블정의서
                </a>
                <a href="/core/guide/게시판_사용자_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    사용자 매뉴얼
                </a>
                <a href="/core/guide/관리자페이지_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    관리자 매뉴얼
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2>게시물 작성</h2>
                <div class="admin-header__actions">
                    <a href="/admin/boards" class="btn btn--secondary">목록으로</a>
                </div>
            </div>

            <div class="admin-content">
                <div class="admin-form-container" style="max-width: 1000px;">
                    <form action="/admin/boards/write" method="post" class="admin-form">
                        <div class="form-group">
                            <label for="categoryId" class="form-label">게시판 <span class="required">*</span></label>
                            <select id="categoryId" name="categoryId" class="form-input" required>
                                <option value="">게시판 선택</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:text="${category.name}"
                                        th:selected="${selectedCategoryId != null && selectedCategoryId == category.id}">게시판</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="title" class="form-label">제목 <span class="required">*</span></label>
                            <input type="text" id="title" name="title" class="form-input" placeholder="제목을 입력하세요" required maxlength="100" />
                        </div>

                        <div class="form-group">
                            <label class="form-label">내용 <span class="required">*</span></label>
                            <div id="editor" class="admin-quill-editor"></div>
                            <textarea id="content" name="content" style="display: none;"></textarea>
                        </div>

                        <!-- 첨부파일 영역 (관리자 - 용량·확장자 제한 없음) -->
                        <div class="form-group">
                            <label class="form-label">첨부파일</label>
                            <div class="admin-attachment-zone" id="attachmentZone">
                                <span>📎 파일을 드래그하거나 클릭하여 첨부하세요 (제한 없음)</span>
                                <input type="file" id="attachmentInput" multiple style="display:none;" />
                            </div>
                            <div class="admin-attachment-list" id="attachmentList"></div>
                        </div>

                        <div class="form-actions">
                            <button type="button" onclick="history.back()" class="btn btn--secondary">취소</button>
                            <button type="submit" class="btn btn--primary">등록</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
    <script src="/vendor/quill/quill.min.js"></script>
    <script>
        function initImageResize(quill) {
            var container = quill.root.parentElement;
            var editorEl  = quill.root;
            var overlay = null, activeImg = null, startX, startW;

            function showOverlay(img) {
                removeOverlay();
                activeImg = img;
                overlay = document.createElement('div');
                overlay.style.cssText = 'position:absolute;box-sizing:border-box;border:2px solid #3498db;pointer-events:none;z-index:100;';
                var handle = document.createElement('div');
                handle.title = '드래그하여 크기 조절';
                handle.style.cssText = 'position:absolute;right:-10px;bottom:-10px;width:20px;height:20px;background:#3498db;cursor:se-resize;pointer-events:all;border-radius:3px;touch-action:none;';
                overlay.appendChild(handle);
                container.appendChild(overlay);
                updateOverlay();
                handle.addEventListener('mousedown', onMouseDown);
                handle.addEventListener('touchstart', onTouchStart, { passive: false });
            }

            function updateOverlay() {
                if (!activeImg || !overlay) return;
                var cRect = container.getBoundingClientRect();
                var iRect = activeImg.getBoundingClientRect();
                overlay.style.left   = (iRect.left - cRect.left) + 'px';
                overlay.style.top    = (iRect.top  - cRect.top)  + 'px';
                overlay.style.width  = iRect.width  + 'px';
                overlay.style.height = iRect.height + 'px';
            }

            function removeOverlay() {
                if (overlay) { overlay.remove(); overlay = null; }
                activeImg = null;
            }

            function onMouseDown(e) {
                e.preventDefault();
                e.stopPropagation();
                startX = e.clientX;
                startW = activeImg.getBoundingClientRect().width;
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }

            function onMouseMove(e) {
                var newW = Math.max(50, startW + (e.clientX - startX));
                activeImg.style.width  = newW + 'px';
                activeImg.style.height = 'auto';
                updateOverlay();
            }

            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }

            function onTouchStart(e) {
                e.preventDefault();
                e.stopPropagation();
                startX = e.touches[0].clientX;
                startW = activeImg.getBoundingClientRect().width;
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.addEventListener('touchend', onTouchEnd);
            }

            function onTouchMove(e) {
                e.preventDefault();
                var newW = Math.max(50, startW + (e.touches[0].clientX - startX));
                activeImg.style.width  = newW + 'px';
                activeImg.style.height = 'auto';
                updateOverlay();
            }

            function onTouchEnd() {
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }

            editorEl.addEventListener('click', function(e) {
                if (e.target.tagName === 'IMG') {
                    showOverlay(e.target);
                } else if (!overlay || !overlay.contains(e.target)) {
                    removeOverlay();
                }
            });

            document.addEventListener('click', function(e) {
                if (!overlay) return;
                if (!container.contains(e.target)) removeOverlay();
            });
        }

        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: '내용을 입력하세요...',
            modules: {
                toolbar: {
                    container: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image'],
                        ['clean']
                    ],
                    handlers: { image: imageHandler }
                }
            }
        });

        initImageResize(quill);

        // data URL → File 매핑 (폼 제출 시 서버 업로드)
        // Quill 1.x는 blob: URL을 보안상 차단하므로 FileReader로 data URL 사용
        var pendingImages = []; // [{ dataUrl, file }]

        // 이미지 핸들러: 선택 시 data URL로 즉시 미리보기, 서버 업로드는 폼 제출 시
        function imageHandler() {
            var input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = function() {
                var file = input.files[0];
                if (!file) return;
                if (file.size > 10 * 1024 * 1024) { alert('파일 크기는 10MB를 초과할 수 없습니다.'); return; }
                if (!file.type.match(/image\/(jpeg|png|gif|webp)/)) { alert('JPG, PNG, GIF, WEBP 파일만 업로드 가능합니다.'); return; }
                var reader = new FileReader();
                reader.onload = function(e) {
                    var dataUrl = e.target.result;
                    pendingImages.push({ dataUrl: dataUrl, file: file });
                    var range = quill.getSelection(true);
                    quill.insertEmbed(range.index, 'image', dataUrl);
                    quill.setSelection(range.index + 1);
                };
                reader.readAsDataURL(file);
            };
        }

        // 에디터 내 data URL 이미지를 서버에 업로드하고 URL 교체
        function uploadPendingImages() {
            var imgs = quill.root.querySelectorAll('img');
            var toUpload = [];
            imgs.forEach(function(img) {
                if (img.src.indexOf('data:') === 0) {
                    var entry = null;
                    for (var i = 0; i < pendingImages.length; i++) {
                        if (pendingImages[i].dataUrl === img.src) { entry = pendingImages[i]; break; }
                    }
                    if (entry) toUpload.push({ img: img, file: entry.file, dataUrl: entry.dataUrl });
                }
            });
            if (toUpload.length === 0) return Promise.resolve();
            var promise = Promise.resolve();
            toUpload.forEach(function(item) {
                promise = promise.then(function() {
                    var formData = new FormData();
                    formData.append('file', item.file);
                    return fetch('/api/upload/image', { method: 'POST', body: formData })
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            if (data.url) {
                                item.img.setAttribute('src', data.url);
                                pendingImages = pendingImages.filter(function(p) { return p.dataUrl !== item.dataUrl; });
                            } else {
                                throw new Error(data.error || '이미지 업로드 실패');
                            }
                        });
                });
            });
            return promise;
        }

    </script>

    <style>
        .admin-attachment-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border: 2px dashed #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #6b7280;
            background: #f9fafb;
            transition: border-color .2s, background .2s;
        }
        .admin-attachment-zone:hover,
        .admin-attachment-zone--drag-over {
            border-color: #6366f1;
            background: #eef2ff;
        }
        .admin-attachment-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .admin-attachment-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
        }
        .admin-attachment-item__name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .admin-attachment-item__size { flex-shrink: 0; font-size: 12px; color: #9ca3af; }
        .admin-attachment-item__progress {
            display: none; flex: 1; height: 6px;
            background: #e5e7eb; border-radius: 3px; overflow: hidden;
        }
        .admin-attachment-item__progress-bar {
            height: 100%; width: 0%;
            background: #6366f1; border-radius: 3px; transition: width 0.15s ease;
        }
        .admin-attachment-item__pct {
            display: none; font-size: 11px; color: #6b7280;
            min-width: 32px; text-align: right; flex-shrink: 0;
        }
        .admin-attachment-item__remove {
            flex-shrink: 0; width: 20px; height: 20px; border: none; background: none;
            cursor: pointer; color: #9ca3af; font-size: 16px; line-height: 1; padding: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background .15s, color .15s;
        }
        .admin-attachment-item__remove:hover { background: #fee2e2; color: #ef4444; }
    </style>
    <script>
        (function() {
            var zone  = document.getElementById('attachmentZone');
            var input = document.getElementById('attachmentInput');
            var list  = document.getElementById('attachmentList');
            var form  = document.querySelector('form.admin-form');
            var pendingFiles = [];

            zone.addEventListener('click', function() { input.click(); });
            input.addEventListener('change', function() { handleFiles(input.files); input.value = ''; });
            zone.addEventListener('dragover', function(e) {
                e.preventDefault(); zone.classList.add('admin-attachment-zone--drag-over');
            });
            zone.addEventListener('dragleave', function() {
                zone.classList.remove('admin-attachment-zone--drag-over');
            });
            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                zone.classList.remove('admin-attachment-zone--drag-over');
                handleFiles(e.dataTransfer.files);
            });

            function handleFiles(files) {
                Array.from(files).forEach(function(file) { addPendingFile(file); });
            }

            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            }

            function addPendingFile(file) {
                var item = document.createElement('div');
                item.className = 'admin-attachment-item';

                var nameSpan = document.createElement('span');
                nameSpan.className = 'admin-attachment-item__name';
                nameSpan.textContent = file.name;

                var sizeSpan = document.createElement('span');
                sizeSpan.className = 'admin-attachment-item__size';
                sizeSpan.textContent = formatFileSize(file.size);

                var progressDiv = document.createElement('div');
                progressDiv.className = 'admin-attachment-item__progress';
                var progressBar = document.createElement('div');
                progressBar.className = 'admin-attachment-item__progress-bar';
                progressDiv.appendChild(progressBar);

                var pctSpan = document.createElement('span');
                pctSpan.className = 'admin-attachment-item__pct';

                var removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'admin-attachment-item__remove';
                removeBtn.textContent = '×';
                removeBtn.addEventListener('click', function() {
                    pendingFiles = pendingFiles.filter(function(pf) { return pf.item !== item; });
                    item.remove();
                });

                item.appendChild(nameSpan);
                item.appendChild(sizeSpan);
                item.appendChild(progressDiv);
                item.appendChild(pctSpan);
                item.appendChild(removeBtn);
                list.appendChild(item);

                pendingFiles.push({ file: file, item: item, nameSpan: nameSpan, sizeSpan: sizeSpan, progressDiv: progressDiv, progressBar: progressBar, pctSpan: pctSpan, removeBtn: removeBtn });
            }

            function uploadWithProgress(pf) {
                return new Promise(function(resolve, reject) {
                    var xhr = new XMLHttpRequest();
                    var formData = new FormData();
                    formData.append('file', pf.file);

                    pf.nameSpan.style.flex = '0 0 auto';
                    pf.nameSpan.style.maxWidth = '50%';
                    pf.sizeSpan.style.display = 'none';
                    pf.progressDiv.style.display = 'flex';
                    pf.pctSpan.style.display = 'inline';
                    pf.removeBtn.style.display = 'none';
                    pf.progressBar.style.width = '0%';
                    pf.pctSpan.textContent = '0%';

                    xhr.upload.addEventListener('progress', function(e) {
                        if (e.lengthComputable) {
                            var pct = Math.round(e.loaded / e.total * 100);
                            pf.progressBar.style.width = pct + '%';
                            pf.pctSpan.textContent = pct + '%';
                        }
                    });

                    xhr.addEventListener('load', function() {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                var data = JSON.parse(xhr.responseText);
                                if (data.error) { reject(data.error); return; }
                                pf.progressBar.style.width = '100%';
                                pf.pctSpan.textContent = '100%';
                                resolve(data);
                            } catch(ex) { reject('서버 응답 오류'); }
                        } else {
                            try { reject(JSON.parse(xhr.responseText).error || '업로드 실패'); }
                            catch(ex) { reject('업로드 실패 (' + xhr.status + ')'); }
                        }
                    });

                    xhr.addEventListener('error', function() { reject('네트워크 오류'); });
                    xhr.open('POST', '/api/upload/attachment');
                    xhr.send(formData);
                });
            }

            function restoreItem(pf) {
                pf.nameSpan.style.flex = '';
                pf.nameSpan.style.maxWidth = '';
                pf.sizeSpan.style.display = '';
                pf.progressDiv.style.display = 'none';
                pf.pctSpan.style.display = 'none';
                pf.removeBtn.style.display = '';
            }

            // 폼 제출: Quill 검증 → 이미지 업로드 → 첨부파일 업로드 → 제출
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                var contentEl = document.getElementById('content');
                contentEl.value = quill.root.innerHTML;
                if (quill.getText().trim().length === 0) {
                    alert('내용을 입력하세요.');
                    return;
                }

                var submitBtn = form.querySelector('[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = '등록 중...';

                // 1단계: 에디터 이미지 서버 업로드 (blob URL → 서버 URL 교체)
                uploadPendingImages()
                    .then(function() {
                        contentEl.value = quill.root.innerHTML;

                        // 2단계: 첨부파일 순차 업로드
                        var snapshot = pendingFiles.slice();
                        var attachmentIds = [];
                        var idx = 0;

                        function uploadNext() {
                            if (idx >= snapshot.length) {
                                attachmentIds.forEach(function(id) {
                                    var hidden = document.createElement('input');
                                    hidden.type = 'hidden';
                                    hidden.name = 'attachmentIds';
                                    hidden.value = id;
                                    form.appendChild(hidden);
                                });
                                form.submit();
                                return;
                            }
                            var pf = snapshot[idx++];
                            uploadWithProgress(pf)
                                .then(function(data) {
                                    attachmentIds.push(data.id);
                                    uploadNext();
                                })
                                .catch(function(err) {
                                    alert(pf.file.name + ' 업로드 실패: ' + err);
                                    restoreItem(pf);
                                    submitBtn.disabled = false;
                                    submitBtn.textContent = '등록';
                                });
                        }

                        uploadNext();
                    })
                    .catch(function(err) {
                        alert('이미지 업로드 실패: ' + err);
                        submitBtn.disabled = false;
                        submitBtn.textContent = '등록';
                    });
            });
        })();
    </script>
</body>
</html>
