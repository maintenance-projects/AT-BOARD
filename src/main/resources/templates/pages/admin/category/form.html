<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? '게시판 수정' : '게시판 생성'} + ' - AT-Board Admin'">게시판 관리 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/boards" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2 th:text="${isEdit ? '게시판 수정' : '게시판 생성'}">게시판 생성</h2>
                <div class="admin-header__actions">
                    <a href="/admin/categories" class="btn btn--secondary">목록으로</a>
                </div>
            </div>

            <div class="admin-content">
                <div class="admin-form-container">
                    <form th:action="${isEdit ? '/admin/categories/edit/' + category.id : '/admin/categories/new'}" method="post" class="admin-form">
                        <div class="form-group">
                            <label for="name" class="form-label">게시판명 <span class="required">*</span></label>
                            <input type="text" id="name" name="name" class="form-input" th:value="${category.name}" placeholder="예: 공지사항, 자유게시판" required maxlength="100" />
                        </div>

                        <div class="form-group">
                            <label for="description" class="form-label">설명</label>
                            <textarea id="description" name="description" class="form-textarea" th:text="${category.description}" placeholder="게시판에 대한 간단한 설명" rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">접근 부서</label>
                            <small class="form-help">부서를 선택하면 해당 부서(및 하위 부서) 사용자만 이 게시판에 접근할 수 있습니다. 선택하지 않으면 전사 공용 게시판이 됩니다.</small>
                            <div class="dept-tree" id="dept-tree">
                                <em style="color: #aaa; font-size: 0.9rem; padding: 8px 0; display: block;">부서 목록을 불러오는 중...</em>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <input type="checkbox" id="adminOnly" name="adminOnly" value="true" th:checked="${category.adminOnly != null && category.adminOnly}" />
                                관리자만 글 작성 허용
                            </label>
                            <small class="form-help">체크하면 관리자 페이지에서만 글을 작성할 수 있습니다.</small>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                <input type="checkbox" id="isActive" name="isActive" value="true" th:checked="${category.isActive != null ? category.isActive : true}" />
                                활성화
                            </label>
                            <small class="form-help">비활성화하면 사용자에게 보이지 않습니다.</small>
                        </div>

                        <div class="form-actions">
                            <button type="button" onclick="history.back()" class="btn btn--secondary">취소</button>
                            <button type="submit" class="btn btn--primary" th:text="${isEdit ? '수정' : '생성'}">생성</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
    <script th:inline="javascript">
    /*<![CDATA[*/
    (function() {
        var departments = /*[[${departments}]]*/ [];
        var selectedDeptIds = /*[[${selectedDeptIds}]]*/ [];

        function buildTree(depts) {
            var map = {};
            var roots = [];
            depts.forEach(function(d) {
                map[d.deptId] = { deptId: d.deptId, deptName: d.deptName, parentDept: d.parentDept, children: [] };
            });
            depts.forEach(function(d) {
                if (d.parentDept && map[d.parentDept]) {
                    map[d.parentDept].children.push(map[d.deptId]);
                } else {
                    roots.push(map[d.deptId]);
                }
            });
            return { roots: roots, map: map };
        }

        // 하위 부서를 강제 체크/해제 (상위 체크 시 하위는 disabled 상태로 체크)
        function setDescendantsForced(node, map, forced) {
            if (!node.children) return;
            node.children.forEach(function(child) {
                var cb = document.querySelector('input[name="deptIds"][value="' + child.deptId + '"]');
                if (cb) {
                    var label = cb.parentElement;
                    if (forced) {
                        cb.checked = true;
                        cb.disabled = true;
                        label.classList.add('dept-tree__label--inherited');
                    } else {
                        cb.checked = false;
                        cb.disabled = false;
                        label.classList.remove('dept-tree__label--inherited');
                    }
                }
                setDescendantsForced(child, map, forced);
            });
        }

        function renderNode(node, map) {
            var li = document.createElement('li');
            li.className = 'dept-tree__item';

            var row = document.createElement('div');
            row.className = 'dept-tree__row';

            var hasChildren = node.children && node.children.length > 0;
            var childrenEl = null;

            if (hasChildren) {
                childrenEl = document.createElement('ul');
                childrenEl.className = 'dept-tree__children dept-tree__children--open';
                node.children.forEach(function(child) {
                    childrenEl.appendChild(renderNode(child, map));
                });
            }

            var toggleBtn = document.createElement('button');
            toggleBtn.type = 'button';
            toggleBtn.className = 'dept-tree__toggle' + (hasChildren ? '' : ' dept-tree__toggle--hidden');
            toggleBtn.textContent = hasChildren ? '\u25bc' : '';
            if (hasChildren) {
                (function(btn, el) {
                    btn.onclick = function() {
                        var open = el.classList.contains('dept-tree__children--open');
                        el.classList.toggle('dept-tree__children--open', !open);
                        btn.textContent = open ? '\u25ba' : '\u25bc';
                    };
                })(toggleBtn, childrenEl);
            }

            var label = document.createElement('label');
            label.className = 'dept-tree__label';

            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.name = 'deptIds';
            cb.value = node.deptId;
            if (selectedDeptIds.indexOf(node.deptId) !== -1) {
                cb.checked = true;
            }

            // 상위 체크 시 하위 부서 강제 체크 (해제 불가)
            (function(n, m) {
                cb.onchange = function() {
                    setDescendantsForced(n, m, cb.checked);
                };
            })(node, map);

            var nameText = document.createTextNode('\u00a0' + node.deptName + ' (' + node.deptId + ')');

            label.appendChild(cb);
            label.appendChild(nameText);
            row.appendChild(toggleBtn);
            row.appendChild(label);
            li.appendChild(row);

            if (childrenEl) {
                li.appendChild(childrenEl);
            }

            return li;
        }

        function renderTree() {
            var container = document.getElementById('dept-tree');
            if (!container) return;

            if (!departments || departments.length === 0) {
                container.innerHTML = '<p style="color:#999; padding:8px 0; font-size:0.9rem;">등록된 부서가 없습니다.</p>';
                return;
            }

            var result = buildTree(departments);
            var ul = document.createElement('ul');
            ul.className = 'dept-tree__list';
            result.roots.forEach(function(root) {
                ul.appendChild(renderNode(root, result.map));
            });
            container.innerHTML = '';
            container.appendChild(ul);

            // 편집 모드: 이미 선택된 부서의 하위 부서 강제 체크 적용
            selectedDeptIds.forEach(function(deptId) {
                var node = result.map[deptId];
                if (node) {
                    setDescendantsForced(node, result.map, true);
                }
            });
        }

        renderTree();
    })();
    /*]]>*/
    </script>
</body>
</html>
