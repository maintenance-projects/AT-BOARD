<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 관리 - AT-Board Admin</title>
    <link rel="stylesheet" href="/pages/admin/admin.css" />
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-sidebar__header">
                <h1>AT-Board Admin</h1>
            </div>
            <nav class="admin-sidebar__nav">
                <a href="/admin/dashboard" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📊</span>
                    대시보드
                </a>
                <a href="/admin/categories" class="admin-sidebar__link active">
                    <span class="admin-sidebar__icon">📁</span>
                    게시판 관리
                </a>
                <a href="/admin/templates" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📋</span>
                    글쓰기 양식
                </a>
                <a href="/admin/boards" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">📝</span>
                    게시물 관리
                </a>
                <a href="/admin/settings" class="admin-sidebar__link">
                    <span class="admin-sidebar__icon">⚙️</span>
                    환경설정
                </a>
                <div class="admin-sidebar__divider"></div>
                <span class="admin-sidebar__section-label">매뉴얼 다운로드</span>
                <a href="/core/guide/AT_BOARD_테이블정의서.xlsx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    테이블정의서
                </a>
                <a href="/core/guide/게시판_사용자_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    사용자 매뉴얼
                </a>
                <a href="/core/guide/관리자페이지_매뉴얼.pptx" class="admin-sidebar__link" download>
                    <span class="admin-sidebar__icon">📥</span>
                    관리자 매뉴얼
                </a>
            </nav>
            <div class="admin-sidebar__footer">
                <div class="admin-sidebar__user" th:if="${admin}">
                    <span th:text="${admin.adminName}">관리자</span>
                </div>
                <a href="/admin/logout" class="admin-sidebar__logout">로그아웃</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h2>게시판 관리</h2>
                <div class="admin-header__actions">
                    <a href="/admin/categories/new" class="btn btn--primary">새 게시판 만들기</a>
                </div>
            </div>

            <div class="admin-content">
                <!-- 검색바 -->
                <form class="admin-search-bar" action="/admin/categories" method="get">
                    <input class="form-input admin-search-bar__input" type="text" name="keyword"
                           th:value="${keyword}" placeholder="게시판명 검색" maxlength="100" />
                    <button type="submit" class="btn btn--primary">검색</button>
                    <a th:if="${keyword != null && !#strings.isEmpty(keyword)}"
                       href="/admin/categories" class="btn btn--secondary">초기화</a>
                </form>

                <!-- 검색 결과 안내 -->
                <div th:if="${keyword != null && !#strings.isEmpty(keyword)}" class="admin-search-result">
                    "<span th:text="${keyword}"></span>" 검색 결과
                    <strong th:text="${categories.totalElements} + '건'"></strong>
                </div>

                <div th:if="${categories.totalElements == 0}" class="empty-state">
                    <p th:text="${keyword != null && !#strings.isEmpty(keyword)} ? '검색 결과가 없습니다.' : '등록된 게시판이 없습니다.'">등록된 게시판이 없습니다.</p>
                    <a th:if="${keyword == null || #strings.isEmpty(keyword)}" href="/admin/categories/new" class="btn btn--primary">첫 게시판 만들기</a>
                </div>

                <div th:unless="${categories.totalElements == 0}" class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>게시판명</th>
                                <th>설명</th>
                                <th>유형</th>
                                <th>부서 코드</th>
                                <th>작성 권한</th>
                                <th>상태</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="category : ${categories.content}">
                                <td th:text="${category.id}">1</td>
                                <td><a th:href="@{/admin/boards(categoryId=${category.id})}" th:text="${category.name}" class="link" style="font-weight: 600;">게시판명</a></td>
                                <td th:text="${category.description}">설명</td>
                                <td>
                                    <span th:if="${category.deptSpecific}" class="cat-label cat-label--gray">부서 전용</span>
                                    <span th:unless="${category.deptSpecific}" class="cat-label cat-label--blue">전사 공용</span>
                                </td>
                                <td>
                                    <span th:unless="${category.deptSpecific}" class="cat-label cat-label--muted">-</span>
                                    <th:block th:if="${category.deptSpecific}">
                                        <span th:each="dId : ${category.deptIds}" th:text="${dId}" class="cat-label cat-label--gray"></span>
                                    </th:block>
                                </td>
                                <td>
                                    <span th:if="${category.adminOnly}" class="cat-label cat-label--red">관리자 전용</span>
                                    <span th:unless="${category.adminOnly}" class="cat-label cat-label--green">전체</span>
                                </td>
                                <td>
                                    <span th:if="${category.isActive}" class="cat-label cat-label--green">활성</span>
                                    <span th:unless="${category.isActive}" class="cat-label cat-label--red">비활성</span>
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}" class="btn btn--sm btn--secondary">수정</a>
                                        <form th:action="@{/admin/categories/delete/{id}(id=${category.id})}" method="post" style="display: inline;" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                            <button type="submit" class="btn btn--sm btn--danger">삭제</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- 페이징 -->
                <div class="admin-pagination" th:if="${categories.totalPages > 1}">
                    <a th:if="${categories.hasPrevious()}"
                       th:href="@{/admin/categories(page=${categories.number - 1}, keyword=${keyword})}"
                       class="btn btn--sm btn--secondary">&laquo;</a>
                    <span th:unless="${categories.hasPrevious()}" class="btn btn--sm btn--secondary admin-pagination__disabled">&laquo;</span>

                    <th:block th:with="startPage=${T(java.lang.Math).max(0, categories.number - 2)}, endPage=${T(java.lang.Math).min(categories.totalPages - 1, categories.number + 2)}">
                        <a th:if="${startPage > 0}"
                           th:href="@{/admin/categories(page=0, keyword=${keyword})}"
                           class="btn btn--sm btn--secondary">1</a>
                        <span th:if="${startPage > 1}" class="admin-pagination__ellipsis">…</span>

                        <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
                            <a th:if="${i != categories.number}"
                               th:href="@{/admin/categories(page=${i}, keyword=${keyword})}"
                               th:text="${i + 1}" class="btn btn--sm btn--secondary"></a>
                            <span th:if="${i == categories.number}"
                                  th:text="${i + 1}" class="btn btn--sm btn--primary"></span>
                        </th:block>

                        <span th:if="${endPage < categories.totalPages - 2}" class="admin-pagination__ellipsis">…</span>
                        <a th:if="${endPage < categories.totalPages - 1}"
                           th:href="@{/admin/categories(page=${categories.totalPages - 1}, keyword=${keyword})}"
                           th:text="${categories.totalPages}" class="btn btn--sm btn--secondary"></a>
                    </th:block>

                    <a th:if="${categories.hasNext()}"
                       th:href="@{/admin/categories(page=${categories.number + 1}, keyword=${keyword})}"
                       class="btn btn--sm btn--secondary">&raquo;</a>
                    <span th:unless="${categories.hasNext()}" class="btn btn--sm btn--secondary admin-pagination__disabled">&raquo;</span>
                </div>
            </div>
        </main>
    </div>

    <script src="/pages/admin/admin.js"></script>
</body>
</html>
