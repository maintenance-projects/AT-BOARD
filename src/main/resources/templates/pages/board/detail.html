<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{core/layout :: layout('게시글 상세', ~{::pageHeader}, ~{::pageBody}, ~{::pageHead}, ~{::pageScripts})}">

<head>
    <th:block th:fragment="pageHead">
        <link rel="stylesheet" href="/pages/board/board.css" />
    </th:block>
</head>

<body>
    <th:block th:fragment="pageHeader">
        <div class="topbar topbar--center">
            <a th:href="@{/board(categoryId=${backCategoryId}, searchType=${backKeyword != null ? backSearchType : null}, keyword=${backKeyword})}"
               class="topbar__btn" aria-label="목록으로">
                <span class="ico ico--back" aria-hidden="true"></span>
            </a>
            <h1 class="topbar__title">게시글</h1>
            <div class="topbar__menu-wrap" th:if="${currentUser != null && board.userId == currentUser.userId}">
                <button class="topbar__btn" type="button" onclick="toggleMenu()" aria-label="메뉴">
                    <span class="ico ico--menu" aria-hidden="true"></span>
                </button>
                <div id="actionMenu" class="action-menu" style="display: none;">
                    <a th:href="@{/board/edit/{id}(id=${board.id})}" class="action-menu__item">수정</a>
                    <button type="button" onclick="deletePost()" class="action-menu__item action-menu__item--danger">삭제</button>
                </div>
            </div>
            <div class="topbar__spacer" th:unless="${currentUser != null && board.userId == currentUser.userId}"></div>
        </div>
    </th:block>

    <th:block th:fragment="pageBody">
        <main class="page">
            <button type="button" id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="최상단으로 이동"></button>
            <article class="board-detail">
                <header class="board-detail__header">
                    <h2 class="board-detail__title" th:text="${board.title}">제목</h2>
                    <div class="board-detail__meta">
                        <span class="profile-avatar profile-avatar--md"
                              th:attr="data-photo-url=${profilePhotoUrlPattern != null && !#strings.isEmpty(profilePhotoUrlPattern) ? #strings.replace(profilePhotoUrlPattern, '{userId}', board.userId) : ''}">
                            <span class="profile-avatar__letter" th:text="${#strings.substring(board.authorNameOnly, 0, 1)}">홍</span>
                            <img class="profile-avatar__img" alt="" />
                        </span>
                        <div class="board-detail__meta-text">
                            <span class="board-detail__author" th:text="${board.authorName}">작성자</span>
                            <div class="board-detail__meta-sub">
                                <time class="board-detail__date" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</time>
                                <span class="board-detail__dot">·</span>
                                <span class="board-detail__views">조회 <span th:text="${board.viewCount}">0</span></span>
                            </div>
                        </div>
                    </div>
                </header>

                <div class="board-detail__divider"></div>

                <div class="board-detail__content">
                    <div th:utext="${board.content}">내용</div>
                </div>

                <!-- 첨부파일 -->
                <div class="attachment-download-section --open" th:if="${attachments != null && !attachments.isEmpty()}">
                    <h4 class="attachment-download-section__title" onclick="if(window.innerWidth<1024)this.closest('.attachment-download-section').classList.toggle('--open')">
                        <span>첨부파일 <span th:text="${attachments.size()}">0</span>개</span>
                        <button type="button" class="attachment-accordion-btn">
                            <span class="attachment-accordion-chevron"></span>
                        </button>
                    </h4>
                    <ul class="attachment-download-list">
                        <li th:each="attachment : ${attachments}"
                            th:class="${attachment.isExpired()} ? 'attachment-download-item attachment-download-item--expired' : 'attachment-download-item'">
                            <span class="attachment-download-item__icon">📎</span>
                            <!-- 다운로드 가능 -->
                            <a th:unless="${attachment.isExpired()}"
                               th:href="@{/board/attachments/{id}/download(id=${attachment.id})}"
                               class="attachment-download-item__name"
                               th:text="${attachment.originalName}"
                               onclick="this.href=this.href.split('?')[0]+'?t='+Date.now()">파일명</a>
                            <!-- 만료됨 -->
                            <span th:if="${attachment.isExpired()}"
                                  class="attachment-download-item__name attachment-download-item__name--expired"
                                  th:text="${attachment.originalName}">파일명</span>
                            <!-- 크기 + 만료일 또는 만료 배지 -->
                            <span th:if="${attachment.isExpired()}" class="attachment-expired-badge">다운로드 기간 만료</span>
                            <th:block th:unless="${attachment.isExpired()}">
                                <span class="attachment-download-item__size" th:text="${attachment.fileSizeDisplay}">크기</span>
                                <span th:if="${attachment.expiresAt != null}" class="attachment-expiry-info"
                                      th:text="'~' + ${#temporals.format(attachment.expiresAt, 'yyyy-MM-dd')}">~2025-12-31</span>
                            </th:block>
                        </li>
                    </ul>
                </div>

                <!-- 좋아요 -->
                <div class="board-detail__reactions">
                    <button type="button"
                            th:class="${isLiked ? 'like-btn like-btn--active' : 'like-btn'}"
                            onclick="toggleLike()"
                            th:data-board-id="${board.id}">
                        <span class="ico ico--heart" aria-hidden="true"></span>
                        <span class="like-count" th:text="${board.likeCount}">0</span>
                    </button>
                </div>

                <!-- 댓글 -->
                <div id="comments-section-wrapper">
                    <th:block th:insert="~{fragments/comments :: commentsList}"></th:block>
                </div>

                <div class="board-detail__actions">
                    <a th:href="@{/board(categoryId=${backCategoryId}, searchType=${backKeyword != null ? backSearchType : null}, keyword=${backKeyword})}" class="btn btn--secondary">목록으로</a>
                </div>
            </article>
        </main>

        <form th:action="@{/board/delete/{id}(id=${board.id})}" method="post" id="deleteForm" style="display: none;">
            <input type="hidden" name="categoryId" th:value="${board.category.id}" />
        </form>

        <!-- 이미지 뷰어 -->
        <div id="imageViewer" class="img-viewer" style="display:none;" role="dialog" aria-modal="true">
            <button class="img-viewer__close" type="button" aria-label="닫기">&times;</button>
            <span class="img-viewer__counter" id="viewerCounter"></span>
            <button class="img-viewer__prev" type="button" aria-label="이전 이미지">&#10094;</button>
            <div class="img-viewer__main">
                <img id="viewerMainImg" class="img-viewer__main-img" src="" alt="이미지">
            </div>
            <button class="img-viewer__next" type="button" aria-label="다음 이미지">&#10095;</button>
            <div class="img-viewer__thumbs" id="viewerThumbs"></div>
        </div>
    </th:block>

    <th:block th:fragment="pageScripts">
        <script src="/pages/board/board.js"></script>
        <script th:inline="javascript">
            var profilePhotoUrlPattern = /*[[${profilePhotoUrlPattern}]]*/ '';
            // 읽음 처리 (N 배지 소멸)
            (function() {
                var boardId = String(/*[[${board.id}]]*/0);
                try {
                    var readSet = JSON.parse(localStorage.getItem('atboard_read') || '{}');
                    readSet[boardId] = Date.now();
                    localStorage.setItem('atboard_read', JSON.stringify(readSet));
                } catch(e) {}
            })();

            // 최상단 이동 플로팅 버튼
            (function() {
                const btn = document.getElementById('scrollTopBtn');
                window.addEventListener('scroll', function() {
                    const scrollY = window.scrollY || window.pageYOffset || 0;
                    if (scrollY > 300) {
                        btn.classList.add('scroll-top-btn--visible');
                    } else {
                        btn.classList.remove('scroll-top-btn--visible');
                    }
                }, { passive: true });
            })();

            function scrollToTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function toggleMenu() {
                const menu = document.getElementById('actionMenu');
                menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
            }

            function deletePost() {
                if (confirm('정말 삭제하시겠습니까?')) {
                    document.getElementById('deleteForm').submit();
                }
            }

            document.addEventListener('click', function(e) {
                const menu = document.getElementById('actionMenu');
                const menuBtn = document.querySelector('[onclick="toggleMenu()"]');
                if (menu && menu.style.display !== 'none' && !menu.contains(e.target) && !menuBtn.contains(e.target)) {
                    menu.style.display = 'none';
                }
            });

            // 이미지 뷰어
            (function() {
                var viewer = document.getElementById('imageViewer');
                var mainImg = document.getElementById('viewerMainImg');
                var mainEl = viewer.querySelector('.img-viewer__main');
                var thumbsEl = document.getElementById('viewerThumbs');
                var counterEl = document.getElementById('viewerCounter');
                var prevBtn = viewer.querySelector('.img-viewer__prev');
                var nextBtn = viewer.querySelector('.img-viewer__next');

                var srcs = [];
                var current = 0;

                // ── 줌/패닝 상태 ──────────────────────────────────────────
                var scale = 1;
                var translateX = 0;
                var translateY = 0;
                var MIN_SCALE = 1;
                var MAX_SCALE = 5;

                function applyTransform() {
                    mainImg.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
                    mainImg.style.cursor = scale > 1 ? (isDragging ? 'grabbing' : 'grab') : 'zoom-in';
                }

                function resetZoom() {
                    scale = 1; translateX = 0; translateY = 0; isDragging = false;
                    mainImg.style.transform = '';
                    mainImg.style.cursor = 'zoom-in';
                }

                // ── PC: 휠 줌 (커서 위치 기준) ────────────────────────────
                mainEl.addEventListener('wheel', function(e) {
                    e.preventDefault();
                    var factor = e.deltaY < 0 ? 1.15 : (1 / 1.15);
                    var newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
                    if (newScale === scale) return;
                    if (newScale <= MIN_SCALE) {
                        scale = MIN_SCALE; translateX = 0; translateY = 0;
                    } else {
                        // mainEl 중심 기준으로 커서 위치에 맞게 translate 보정
                        var rect = mainEl.getBoundingClientRect();
                        var ncx = rect.left + rect.width / 2;
                        var ncy = rect.top + rect.height / 2;
                        var ox = e.clientX - ncx;
                        var oy = e.clientY - ncy;
                        var ratio = newScale / scale;
                        translateX = ox * (1 - ratio) + translateX * ratio;
                        translateY = oy * (1 - ratio) + translateY * ratio;
                        scale = newScale;
                    }
                    applyTransform();
                }, { passive: false });

                // ── PC: 마우스 드래그 패닝 ─────────────────────────────────
                var isDragging = false;
                var dragStartX = 0, dragStartY = 0, dragStartTX = 0, dragStartTY = 0;

                mainImg.addEventListener('mousedown', function(e) {
                    if (scale <= 1 || e.button !== 0) return;
                    isDragging = true;
                    dragStartX = e.clientX; dragStartY = e.clientY;
                    dragStartTX = translateX; dragStartTY = translateY;
                    mainImg.style.cursor = 'grabbing';
                    e.preventDefault();
                });
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    translateX = dragStartTX + (e.clientX - dragStartX);
                    translateY = dragStartTY + (e.clientY - dragStartY);
                    applyTransform();
                });
                document.addEventListener('mouseup', function() {
                    if (isDragging) {
                        isDragging = false;
                        mainImg.style.cursor = scale > 1 ? 'grab' : 'zoom-in';
                    }
                });

                // ── 모바일: 핀치 줌 + 단일 터치 패닝 ────────────────────────
                var isPinching = false;
                var gestureWasPinch = false; // 핀치가 있었던 제스처인지 추적
                var pinchStartDist = 0, pinchStartScale = 1;
                var pinchStartTX = 0, pinchStartTY = 0;
                var touchStartX = 0, touchStartTX = 0, touchStartTY = 0;

                function getTouchDist(t1, t2) {
                    var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
                    return Math.sqrt(dx * dx + dy * dy);
                }

                mainEl.addEventListener('touchstart', function(e) {
                    if (e.touches.length === 2) {
                        isPinching = true;
                        gestureWasPinch = true; // 이 제스처에 핀치가 포함됨
                        pinchStartDist = getTouchDist(e.touches[0], e.touches[1]);
                        pinchStartScale = scale;
                        pinchStartTX = translateX; pinchStartTY = translateY;
                        e.preventDefault();
                    } else if (e.touches.length === 1) {
                        gestureWasPinch = false; // 새 단일 터치 제스처 시작
                        touchStartX = e.touches[0].clientX;
                        if (scale > 1) {
                            // 줌 상태: 패닝 시작
                            dragStartX = e.touches[0].clientX;
                            dragStartY = e.touches[0].clientY;
                            dragStartTX = translateX; dragStartTY = translateY;
                        }
                    }
                }, { passive: false });

                mainEl.addEventListener('touchmove', function(e) {
                    if (isPinching && e.touches.length === 2) {
                        e.preventDefault();
                        var dist = getTouchDist(e.touches[0], e.touches[1]);
                        var newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * (dist / pinchStartDist)));
                        // 핀치 중심점 기준 보정
                        var rect = mainEl.getBoundingClientRect();
                        var ncx = rect.left + rect.width / 2;
                        var ncy = rect.top + rect.height / 2;
                        var mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        var my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        var ox = mx - ncx, oy = my - ncy;
                        var ratio = newScale / pinchStartScale;
                        translateX = ox * (1 - ratio) + pinchStartTX * ratio;
                        translateY = oy * (1 - ratio) + pinchStartTY * ratio;
                        scale = newScale;
                        applyTransform();
                    } else if (!isPinching && e.touches.length === 1 && scale > 1) {
                        e.preventDefault();
                        translateX = dragStartTX + (e.touches[0].clientX - dragStartX);
                        translateY = dragStartTY + (e.touches[0].clientY - dragStartY);
                        applyTransform();
                    }
                }, { passive: false });

                mainEl.addEventListener('touchend', function(e) {
                    if (e.touches.length < 2) isPinching = false;
                    // 핀치가 없었던 순수 단일 터치 스와이프만 이미지 전환
                    if (!gestureWasPinch && scale <= 1 && e.changedTouches.length > 0) {
                        var dx = e.changedTouches[0].clientX - touchStartX;
                        if (Math.abs(dx) > 50) {
                            if (dx < 0) nextImage(); else prevImage();
                        }
                    }
                });

                // ── 콘텐츠 내 이미지 수집 ─────────────────────────────────
                var contentImgs = Array.from(document.querySelectorAll('.board-detail__content img'));
                if (contentImgs.length === 0) return;

                contentImgs.forEach(function(img, i) {
                    srcs.push(img.src);
                    img.style.cursor = 'zoom-in';
                    img.addEventListener('click', function() { openViewer(i); });
                });

                // 썸네일 생성
                if (srcs.length > 1) {
                    srcs.forEach(function(src, i) {
                        var t = document.createElement('img');
                        t.src = src;
                        t.className = 'img-viewer__thumb';
                        t.alt = (i + 1) + '번 이미지';
                        t.addEventListener('click', function(e) {
                            e.stopPropagation();
                            current = i;
                            updateViewer();
                        });
                        thumbsEl.appendChild(t);
                    });
                } else {
                    thumbsEl.style.display = 'none';
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                }

                function openViewer(index) {
                    current = index;
                    viewer.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                    updateViewer();
                }

                function closeViewer() {
                    resetZoom();
                    viewer.style.display = 'none';
                    document.body.style.overflow = '';
                }

                function prevImage() { current = (current - 1 + srcs.length) % srcs.length; updateViewer(); }
                function nextImage() { current = (current + 1) % srcs.length; updateViewer(); }

                function updateViewer() {
                    resetZoom();
                    mainImg.src = srcs[current];
                    counterEl.textContent = srcs.length > 1 ? (current + 1) + ' / ' + srcs.length : '';
                    var thumbs = thumbsEl.querySelectorAll('.img-viewer__thumb');
                    thumbs.forEach(function(t, i) {
                        t.classList.toggle('img-viewer__thumb--active', i === current);
                    });
                    if (thumbs[current]) {
                        thumbs[current].scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
                    }
                }

                // 버튼 이벤트
                viewer.querySelector('.img-viewer__close').addEventListener('click', closeViewer);
                prevBtn.addEventListener('click', function(e) { e.stopPropagation(); prevImage(); });
                nextBtn.addEventListener('click', function(e) { e.stopPropagation(); nextImage(); });

                // 배경 클릭으로 닫기 (줌 상태에서는 제외)
                viewer.addEventListener('click', function(e) {
                    if (scale > 1) return;
                    if (e.target === viewer || e.target === mainEl) closeViewer();
                });

                // 키보드: 방향키 이동, ESC 닫기, +/- 줌
                document.addEventListener('keydown', function(e) {
                    if (viewer.style.display === 'none') return;
                    if (e.key === 'ArrowLeft') prevImage();
                    else if (e.key === 'ArrowRight') nextImage();
                    else if (e.key === 'Escape') closeViewer();
                    else if (e.key === '+' || e.key === '=') {
                        scale = Math.min(MAX_SCALE, scale * 1.2);
                        applyTransform();
                    } else if (e.key === '-') {
                        scale = Math.max(MIN_SCALE, scale / 1.2);
                        if (scale <= MIN_SCALE) { translateX = 0; translateY = 0; }
                        applyTransform();
                    }
                });
            })();

            // 댓글 인라인 수정
            function startEdit(commentId) {
                var textEl  = document.getElementById('comment-text-' + commentId);
                var editEl  = document.getElementById('comment-edit-' + commentId);
                if (textEl)  textEl.style.display  = 'none';
                if (editEl) {
                    editEl.style.display = 'block';
                    var ta = editEl.querySelector('textarea');
                    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
                }
            }

            function cancelEdit(commentId) {
                var textEl = document.getElementById('comment-text-' + commentId);
                var editEl = document.getElementById('comment-edit-' + commentId);
                if (textEl) textEl.style.display = '';
                if (editEl) editEl.style.display  = 'none';
            }

            // 답댓글 아코디언 토글
            function toggleReply(commentId) {
                var area = document.getElementById('reply-area-' + commentId);
                if (!area) return;
                var isOpen = area.classList.toggle('reply-area--open');
                var footer = area.previousElementSibling;
                if (footer) {
                    var btn = footer.querySelector('.comment-item__reply-btn');
                    if (btn) btn.classList.toggle('comment-item__reply-btn--active', isOpen);
                }
                if (isOpen) {
                    var textarea = area.querySelector('textarea');
                    if (textarea) setTimeout(function() { textarea.focus(); }, 300);
                }
            }

            // AJAX 댓글 처리
            var boardId = /*[[${board.id}]]*/ 0;

            function reloadComments(extraOpenId) {
                // 리로드 전에 현재 열린 답글 영역 ID 목록 수집
                var openIds = [];
                document.querySelectorAll('.reply-area--open').forEach(function(area) {
                    openIds.push(area.id.replace('reply-area-', ''));
                });
                if (extraOpenId && openIds.indexOf(String(extraOpenId)) === -1) {
                    openIds.push(String(extraOpenId));
                }

                return fetch('/board/' + boardId + '/comments/fragment')
                    .then(function(res) { return res.text(); })
                    .then(function(html) {
                        var wrapper = document.getElementById('comments-section-wrapper');
                        if (wrapper) {
                            wrapper.innerHTML = html;
                            loadProfilePhotos(wrapper);
                            // 열려 있던 답글 영역 복원
                            openIds.forEach(function(id) {
                                var area = document.getElementById('reply-area-' + id);
                                if (!area) return;
                                area.classList.add('reply-area--open');
                                var footer = area.previousElementSibling;
                                if (footer) {
                                    var btn = footer.querySelector('.comment-item__reply-btn');
                                    if (btn) btn.classList.add('comment-item__reply-btn--active');
                                }
                            });
                        }
                    })
                    .catch(function(e) {
                        console.error('댓글 새로고침 실패:', e);
                    });
            }

            function getReplyAreaId(form) {
                // 답글 폼/수정폼/삭제폼이 속한 reply-area의 comment ID 반환
                var replyArea = form.closest('.reply-area');
                if (replyArea) return replyArea.id.replace('reply-area-', '');
                // 답글 작성 폼: parentId hidden input
                var parentInput = form.querySelector('input[name="parentId"]');
                if (parentInput && parentInput.value) return parentInput.value;
                return null;
            }

            function submitCommentAjax(form, btn, keepOpenId) {
                if (btn) btn.disabled = true;
                var data = new FormData(form);
                fetch(form.action, { method: 'POST', body: data, redirect: 'manual' })
                    .then(function() { return reloadComments(keepOpenId); })
                    .catch(function(e) { console.error('댓글 요청 오류:', e); })
                    .then(function() { if (btn) btn.disabled = false; });
            }

            // 이벤트 델리게이션: 댓글 관련 폼 submit 인터셉트
            document.addEventListener('submit', function(e) {
                var form = e.target;
                // 댓글 작성 / 답글 작성
                if (form.classList.contains('comment-form')) {
                    var textarea = form.querySelector('textarea[name="content"]');
                    if (!textarea || !textarea.value.trim()) return;
                    e.preventDefault();
                    submitCommentAjax(form, form.querySelector('button[type="submit"]'), getReplyAreaId(form));
                    return;
                }
                // 댓글 수정
                if (form.classList.contains('comment-edit__form')) {
                    e.preventDefault();
                    submitCommentAjax(form, form.querySelector('button[type="submit"]'), getReplyAreaId(form));
                    return;
                }
                // 댓글 삭제
                if (form.classList.contains('comment-delete-form')) {
                    if (!confirm('댓글을 삭제하시겠습니까?')) {
                        e.preventDefault();
                        return;
                    }
                    e.preventDefault();
                    submitCommentAjax(form, null, getReplyAreaId(form));
                    return;
                }
            });

            // 좋아요 토글
            function toggleLike() {
                const btn = document.querySelector('.like-btn');
                const boardId = btn.dataset.boardId;

                fetch('/board/' + boardId + '/like', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.isLiked) {
                        btn.classList.add('like-btn--active');
                    } else {
                        btn.classList.remove('like-btn--active');
                    }
                    document.querySelector('.like-count').textContent = data.likeCount;
                })
                .catch(error => console.error('Error:', error));
            }

            // 프로필 사진 로드
            loadProfilePhotos();
            // 본문 이미지 로드 실패 시 대체 이미지
            handleBrokenImages('.board-detail__content');
        </script>
    </th:block>
</body>

</html>
