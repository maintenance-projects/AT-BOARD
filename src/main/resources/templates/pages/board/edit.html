<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{core/layout :: layout('글 수정', ~{::pageHeader}, ~{::pageBody}, ~{::pageHead}, ~{::pageScripts})}">

<head>
    <th:block th:fragment="pageHead">
        <link rel="stylesheet" href="/pages/board/board.css" />
        <!-- Quill 에디터 CSS -->
        <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    </th:block>
</head>

<body>
    <th:block th:fragment="pageHeader">
        <div class="topbar topbar--center">
            <div class="topbar__spacer"></div>
            <h1 class="topbar__title">글 수정</h1>
            <div class="topbar__spacer"></div>
        </div>
    </th:block>

    <th:block th:fragment="pageBody">
        <main class="page">
            <form th:action="@{/board/edit/{id}(id=${board.id})}" method="post" id="editForm" class="board-form">
                <div class="form-group">
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-input"
                        th:value="${board.title}"
                        placeholder="제목을 입력하세요"
                        required
                        maxlength="100"
                    />
                </div>

                <div class="form-group form-group--flex">
                    <!-- Quill 에디터 -->
                    <div id="editor" class="quill-editor"></div>
                    <!-- 숨겨진 textarea에 실제 내용 저장 -->
                    <textarea
                        id="content"
                        name="content"
                        style="display: none;"
                        th:text="${board.content}"
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" onclick="history.back()" class="btn btn--secondary">취소</button>
                    <button type="submit" class="btn btn--primary">수정</button>
                </div>
            </form>
        </main>
    </th:block>

    <th:block th:fragment="pageScripts">
        <!-- Quill 에디터 JS -->
        <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
        <script th:inline="javascript">
            // 이미지 리사이즈 핸들러
            function initImageResize(quill) {
                var container = quill.root.parentElement;
                var editorEl  = quill.root;
                var overlay = null, activeImg = null, startX, startW;

                function showOverlay(img) {
                    removeOverlay();
                    activeImg = img;
                    overlay = document.createElement('div');
                    overlay.style.cssText = 'position:absolute;box-sizing:border-box;border:2px solid #3498db;pointer-events:none;z-index:100;';
                    var handle = document.createElement('div');
                    handle.title = '드래그하여 크기 조절';
                    handle.style.cssText = 'position:absolute;right:-10px;bottom:-10px;width:20px;height:20px;background:#3498db;cursor:se-resize;pointer-events:all;border-radius:3px;touch-action:none;';
                    overlay.appendChild(handle);
                    container.appendChild(overlay);
                    updateOverlay();
                    handle.addEventListener('mousedown', onMouseDown);
                    handle.addEventListener('touchstart', onTouchStart, { passive: false });
                }

                function updateOverlay() {
                    if (!activeImg || !overlay) return;
                    var cRect = container.getBoundingClientRect();
                    var iRect = activeImg.getBoundingClientRect();
                    overlay.style.left   = (iRect.left - cRect.left) + 'px';
                    overlay.style.top    = (iRect.top  - cRect.top)  + 'px';
                    overlay.style.width  = iRect.width  + 'px';
                    overlay.style.height = iRect.height + 'px';
                }

                function removeOverlay() {
                    if (overlay) { overlay.remove(); overlay = null; }
                    activeImg = null;
                }

                function onMouseDown(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.clientX;
                    startW = activeImg.getBoundingClientRect().width;
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                }

                function onMouseMove(e) {
                    var newW = Math.max(50, startW + (e.clientX - startX));
                    activeImg.style.width  = newW + 'px';
                    activeImg.style.height = 'auto';
                    updateOverlay();
                }

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                function onTouchStart(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.touches[0].clientX;
                    startW = activeImg.getBoundingClientRect().width;
                    document.addEventListener('touchmove', onTouchMove, { passive: false });
                    document.addEventListener('touchend', onTouchEnd);
                }

                function onTouchMove(e) {
                    e.preventDefault();
                    var newW = Math.max(50, startW + (e.touches[0].clientX - startX));
                    activeImg.style.width  = newW + 'px';
                    activeImg.style.height = 'auto';
                    updateOverlay();
                }

                function onTouchEnd() {
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                }

                editorEl.addEventListener('click', function(e) {
                    if (e.target.tagName === 'IMG') {
                        showOverlay(e.target);
                    } else if (!overlay || !overlay.contains(e.target)) {
                        removeOverlay();
                    }
                });

                document.addEventListener('click', function(e) {
                    if (!overlay) return;
                    if (!container.contains(e.target)) removeOverlay();
                });
            }

            // Quill 에디터 초기화
            const quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: '내용을 입력하세요...',
                modules: {
                    toolbar: {
                        container: [
                            [{ 'header': [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'color': [] }, { 'background': [] }],
                            ['link', 'image'],
                            ['clean']
                        ],
                        handlers: {
                            image: imageHandler
                        }
                    }
                }
            });

            initImageResize(quill);

            // 기존 내용 로드
            const existingContent = /*[[${board.content}]]*/ '';
            if (existingContent) {
                quill.root.innerHTML = existingContent;
            }

            // 이미지 업로드 핸들러
            function imageHandler() {
                const input = document.createElement('input');
                input.setAttribute('type', 'file');
                input.setAttribute('accept', 'image/*');
                input.click();

                input.onchange = async function() {
                    const file = input.files[0];
                    if (!file) return;

                    // 파일 크기 체크 (10MB)
                    if (file.size > 10 * 1024 * 1024) {
                        alert('파일 크기는 10MB를 초과할 수 없습니다.');
                        return;
                    }

                    // 이미지 타입 체크
                    if (!file.type.match(/image\/(jpeg|png|gif|webp)/)) {
                        alert('JPG, PNG, GIF, WEBP 파일만 업로드 가능합니다.');
                        return;
                    }

                    // FormData 생성
                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        // 업로드 진행 표시
                        const range = quill.getSelection(true);
                        quill.insertText(range.index, '이미지 업로드 중...');
                        quill.setSelection(range.index + 13);

                        // 서버에 업로드
                        const response = await fetch('/api/upload/image', {
                            method: 'POST',
                            body: formData
                        });

                        const data = await response.json();

                        if (response.ok && data.url) {
                            // 업로드 성공: 임시 텍스트 삭제하고 이미지 삽입
                            quill.deleteText(range.index, 13);
                            quill.insertEmbed(range.index, 'image', data.url);
                            quill.setSelection(range.index + 1);
                        } else {
                            // 업로드 실패
                            quill.deleteText(range.index, 13);
                            alert(data.error || '이미지 업로드에 실패했습니다.');
                        }
                    } catch (error) {
                        console.error('Upload error:', error);
                        alert('이미지 업로드 중 오류가 발생했습니다.');
                    }
                };
            }

            // 폼 제출 시 에디터 내용을 textarea에 복사
            document.getElementById('editForm').addEventListener('submit', function(e) {
                const content = document.getElementById('content');
                content.value = quill.root.innerHTML;

                // 내용이 비어있는지 확인
                if (quill.getText().trim().length === 0) {
                    e.preventDefault();
                    alert('내용을 입력하세요.');
                    return false;
                }
            });

            function submitForm() {
                document.getElementById('editForm').querySelector('[type="submit"]').click();
            }
        </script>
    </th:block>
</body>

</html>
