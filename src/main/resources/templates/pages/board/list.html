<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{core/layout :: layout('게시판', ~{::pageHeader}, ~{::pageBody}, ~{::pageHead}, ~{::pageScripts})}">

<head>
    <th:block th:fragment="pageHead">
        <link rel="stylesheet" href="/pages/board/board.css" />
    </th:block>
</head>

<body>
    <th:block th:fragment="pageHeader">
        <div class="topbar topbar--board">
            <button class="topbar__btn topbar__btn--mobile-only" type="button" onclick="toggleCategoryMenu()" aria-label="메뉴">
                <span class="ico ico--menu" aria-hidden="true"></span>
            </button>
            <h1 class="topbar__title" th:text="${selectedCategory != null ? selectedCategory.name : '게시판'}">게시판</h1>
            <div class="topbar__actions">
                <button type="button" class="topbar__btn" id="searchToggleBtn" onclick="toggleSearchPanel()" aria-label="검색">
                    <span class="ico ico--search" aria-hidden="true"></span>
                </button>
                <a th:if="${selectedCategory == null || selectedCategory.adminOnly == null || !selectedCategory.adminOnly}"
                   th:href="@{/board/write(categoryId=${selectedCategory != null ? selectedCategory.id : ''})}"
                   class="topbar__btn"
                   aria-label="글쓰기"
                   onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">
                    <span class="ico ico--write" aria-hidden="true"></span>
                </a>
            </div>
        </div>

        <!-- 게시판 목록 메뉴 -->
        <div id="categoryMenu" class="category-menu" style="display: none;">
            <div class="category-menu__header">
                <h2>게시판 목록</h2>
                <button type="button" onclick="toggleCategoryMenu()" class="category-menu__close">&times;</button>
            </div>
            <!-- 접속자 정보 (모바일) -->
            <div class="category-menu__user" th:if="${currentUser != null}">
                <span class="board-sidebar__avatar"
                      th:attr="data-photo-url=${profilePhotoUrlPattern != null && !#strings.isEmpty(profilePhotoUrlPattern) ? #strings.replace(profilePhotoUrlPattern, '{userId}', currentUser.userId) : ''}">
                    <span class="board-sidebar__avatar-letter" th:text="${#strings.substring(currentUser.userName, 0, 1)}">홍</span>
                    <img class="board-sidebar__avatar-img" alt="" />
                </span>
                <div class="board-sidebar__user-info">
                    <span class="board-sidebar__user-name" th:text="${currentUser.userName}">홍길동</span>
                    <span class="board-sidebar__user-pos"
                          th:if="${currentUser.posName != null && !#strings.isEmpty(currentUser.posName)}"
                          th:text="${currentUser.posName}">팀장</span>
                </div>
            </div>
            <nav class="category-menu__list">
                <a th:each="category : ${categories}"
                   th:href="@{/board(categoryId=${category.id})}"
                   th:classappend="${selectedCategory != null && selectedCategory.id == category.id ? 'category-menu__item--active' : ''}"
                   class="category-menu__item"
                   th:attr="data-category-id=${category.id}"
                   onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">
                    <span th:text="${category.name}">게시판명</span>
                    <span th:if="${category.deptId != null}" class="cat-badge cat-badge--dept">부서</span>
                    <span th:if="${category.deptId == null && !category.deptSpecific}" class="cat-badge cat-badge--company">전사</span>
                    <span class="new-badge">N</span>
                </a>
            </nav>
        </div>
        <div id="categoryMenuOverlay" class="category-menu__overlay" style="display: none;" onclick="toggleCategoryMenu()"></div>

        <!-- 검색 패널 (아코디언) -->
        <div id="searchPanel" class="search-panel">
            <form class="search-form" th:action="@{/board}" method="get">
                <input type="hidden" name="categoryId" th:value="${selectedCategory?.id}" />
                <select class="search-form__type" name="searchType">
                    <option value="all"     th:selected="${searchType == 'all'}">제목+내용</option>
                    <option value="title"   th:selected="${searchType == 'title'}">제목</option>
                    <option value="content" th:selected="${searchType == 'content'}">내용</option>
                    <option value="author"  th:selected="${searchType == 'author'}">작성자</option>
                </select>
                <div class="search-form__input-wrap">
                    <input class="search-form__input" type="text" name="keyword"
                           th:value="${keyword}" placeholder="검색어를 입력하세요"
                           maxlength="100" id="searchKeywordInput" autocomplete="off" />
                    <button class="search-form__submit" type="submit" aria-label="검색">
                        <span class="ico ico--search" aria-hidden="true"></span>
                    </button>
                </div>
                <button th:if="${keyword != null && !#strings.isEmpty(keyword)}"
                        type="button" class="search-form__clear"
                        th:onclick="'location.href=\'/board?categoryId=\' + ' + ${selectedCategory?.id} + ' + \'&t=\' + Date.now()'"
                        aria-label="검색 초기화">&times;</button>
            </form>
            <!-- 검색 히스토리 -->
            <div id="searchHistory" class="search-history" style="display:none;">
                <div class="search-history__header">
                    <span class="search-history__label">최근 검색어</span>
                    <div class="search-history__actions">
                        <button type="button" class="search-history__clear-all" onclick="clearAllSearchHistory()">전체 삭제</button>
                        <span class="search-history__divider">|</span>
                        <button type="button" class="search-history__close" onclick="closeSearchHistory()">닫기</button>
                    </div>
                </div>
                <ul class="search-history__list" id="searchHistoryList"></ul>
            </div>
        </div>
    </th:block>

    <th:block th:fragment="pageBody">
        <main class="page">
            <button type="button" id="scrollTopBtn" class="scroll-top-btn" onclick="scrollToTop()" aria-label="최상단으로 이동"></button>
            <div class="board-layout">

                <!-- PC 카테고리 사이드바 (≥1024px에서 표시) -->
                <aside class="board-sidebar">
                    <!-- 접속자 정보 -->
                    <div class="board-sidebar__user" th:if="${currentUser != null}">
                        <span class="board-sidebar__avatar"
                              th:attr="data-photo-url=${profilePhotoUrlPattern != null && !#strings.isEmpty(profilePhotoUrlPattern) ? #strings.replace(profilePhotoUrlPattern, '{userId}', currentUser.userId) : ''}">
                            <span class="board-sidebar__avatar-letter" th:text="${#strings.substring(currentUser.userName, 0, 1)}">홍</span>
                            <img class="board-sidebar__avatar-img" alt="" />
                        </span>
                        <div class="board-sidebar__user-info">
                            <span class="board-sidebar__user-dept" th:if="${currentUser.deptName != null && !#strings.isEmpty(currentUser.deptName)}"
                                  th:text="${currentUser.deptName}">개발팀</span>
                            <span class="board-sidebar__user-name" th:text="${currentUser.userName}">홍길동</span>
                            <span class="board-sidebar__user-pos" th:if="${currentUser.posName != null && !#strings.isEmpty(currentUser.posName)}"
                                  th:text="${currentUser.posName}">팀장</span>
                        </div>
                    </div>
                    <nav>
                        <a th:each="category : ${categories}"
                           th:href="@{/board(categoryId=${category.id})}"
                           th:classappend="${selectedCategory != null && selectedCategory.id == category.id ? ' board-sidebar__item--active' : ''}"
                           class="board-sidebar__item"
                           th:attr="data-category-id=${category.id}"
                           onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">
                            <span th:text="${category.name}">게시판명</span>
                            <span th:if="${category.deptId != null}" class="cat-badge cat-badge--dept">부서</span>
                            <span th:if="${category.deptId == null && !category.deptSpecific}" class="cat-badge cat-badge--company">전사</span>
                            <span class="new-badge">N</span>
                        </a>
                    </nav>
                    <div class="board-sidebar__guide">
                        <a href="/core/guide/게시판_사용자_매뉴얼.pptx" download class="board-sidebar__guide-link">
                            <span class="ico ico--download" aria-hidden="true"></span>
                            사용자 매뉴얼
                        </a>
                    </div>
                </aside>

                <!-- 게시글 목록 영역 -->
                <div class="board-list-area">
                    <!-- 검색 결과 안내 -->
                    <div th:if="${keyword != null && !#strings.isEmpty(keyword)}" class="search-result-info">
                        <span th:text="'&quot;' + ${keyword} + '&quot; 검색 결과 '"></span>
                        <strong th:text="${boards.totalElements} + '건'"></strong>
                    </div>

                    <section class="board-list" aria-label="게시글 목록">
                        <div th:if="${boards.totalElements == 0}" class="empty">
                            <p class="empty__text">등록된 게시글이 없습니다.</p>
                        </div>

                        <div th:unless="${boards.totalElements == 0}">
                            <!-- 게시글 목록 -->
                            <div class="board-items" id="boardItems">
                                <article th:each="board : ${boards.content}" class="board-item"
                                         onclick="location.href=this.getAttribute('data-href')+'&t='+Date.now()"
                                         th:attr="data-href=@{/board/{id}(id=${board.id}, categoryId=${selectedCategory.id}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})},data-board-id=${board.id},data-created-at=${board.createdAtEpochMilli},data-category-id=${board.category.id}">
                                    <div class="board-item__header">
                                        <h2 class="board-item__title">
                                        <span th:text="${board.title}">제목</span>
                                        <span th:if="${board.hasImage}" class="board-item__img-badge" title="이미지 포함">
                                            <span class="ico ico--image" aria-hidden="true"></span>
                                        </span>
                                        <span th:if="${attachedBoardIds.contains(board.id)}" class="board-item__attach-badge" title="첨부파일 있음">
                                            <span class="ico ico--attach" aria-hidden="true"></span>
                                        </span>
                                        <span class="new-badge">N</span>
                                    </h2>
                                        <div class="board-item__meta">
                                            <span class="profile-avatar"
                                                  th:attr="data-photo-url=${profilePhotoUrlPattern != null && !#strings.isEmpty(profilePhotoUrlPattern) ? #strings.replace(profilePhotoUrlPattern, '{userId}', board.userId) : ''}">
                                                <span class="profile-avatar__letter" th:text="${#strings.substring(board.authorNameOnly, 0, 1)}">홍</span>
                                                <img class="profile-avatar__img" alt="" />
                                            </span>
                                            <span class="board-item__author" th:text="${board.authorName}">작성자</span>
                                            <span class="board-item__dot">·</span>
                                            <time class="board-item__date" th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</time>
                                        </div>
                                    </div>
                                    <p class="board-item__preview" th:text="${#strings.abbreviate(board.plainContent, 100)}">내용 미리보기</p>
                                    <div class="board-item__footer">
                                        <span class="board-item__stat" th:classappend="${likedBoardIds.contains(board.id)} ? 'board-item__stat--liked'">
                                            <span class="ico" th:classappend="${likedBoardIds.contains(board.id)} ? 'ico--heart' : 'ico--heart-outline'" aria-hidden="true"></span>
                                            <span th:text="${board.likeCount}">0</span>
                                        </span>
                                        <span class="board-item__stat" th:classappend="${commentedBoardIds.contains(board.id)} ? 'board-item__stat--commented'">
                                            <span class="ico ico--comment" aria-hidden="true"></span>
                                            <span th:text="${board.commentCount}">0</span>
                                        </span>
                                        <span class="board-item__stat">
                                            <span class="ico ico--view" aria-hidden="true"></span>
                                            <span th:text="${board.viewCount}">0</span>
                                        </span>
                                    </div>
                                </article>
                            </div>

                            <!-- PC용 페이징 -->
                            <div class="pagination pagination--desktop" th:if="${boards.totalPages > 1}">
                                <a th:if="${boards.hasPrevious()}"
                                   th:href="@{/board(categoryId=${selectedCategory.id}, page=${boards.number - 1}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                                   class="pagination__btn"
                                   onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">&laquo; 이전</a>
                                <span th:unless="${boards.hasPrevious()}" class="pagination__btn pagination__btn--disabled">&laquo; 이전</span>

                                <th:block th:with="startPage=${T(java.lang.Math).max(0, boards.number - 2)}, endPage=${T(java.lang.Math).min(boards.totalPages - 1, boards.number + 2)}">
                                    <a th:if="${startPage > 0}"
                                       th:href="@{/board(categoryId=${selectedCategory.id}, page=0, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                                       class="pagination__number"
                                       onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">1</a>
                                    <span th:if="${startPage > 1}" class="pagination__ellipsis">...</span>

                                    <th:block th:each="i : ${#numbers.sequence(startPage, endPage)}">
                                        <a th:if="${i != boards.number}"
                                           th:href="@{/board(categoryId=${selectedCategory.id}, page=${i}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                                           th:text="${i + 1}"
                                           class="pagination__number"
                                           onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()"></a>
                                        <span th:if="${i == boards.number}"
                                              th:text="${i + 1}"
                                              class="pagination__number pagination__number--active"></span>
                                    </th:block>

                                    <span th:if="${endPage < boards.totalPages - 2}" class="pagination__ellipsis">...</span>
                                    <a th:if="${endPage < boards.totalPages - 1}"
                                       th:href="@{/board(categoryId=${selectedCategory.id}, page=${boards.totalPages - 1}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                                       th:text="${boards.totalPages}"
                                       class="pagination__number"
                                       onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()"></a>
                                </th:block>

                                <a th:if="${boards.hasNext()}"
                                   th:href="@{/board(categoryId=${selectedCategory.id}, page=${boards.number + 1}, searchType=${keyword != null ? searchType : null}, keyword=${keyword})}"
                                   class="pagination__btn"
                                   onclick="this.href=this.href.split('&t=')[0]+'&t='+Date.now()">다음 &raquo;</a>
                                <span th:unless="${boards.hasNext()}" class="pagination__btn pagination__btn--disabled">다음 &raquo;</span>
                            </div>

                            <!-- 모바일용 무한 스크롤 로딩 인디케이터 -->
                            <div class="loading-indicator pagination--mobile" style="display: none;">
                                <div class="spinner"></div>
                                <p>로딩 중...</p>
                            </div>
                        </div>
                    </section>
                </div>

            </div>
        </main>
    </th:block>

    <th:block th:fragment="pageScripts">
        <script src="/pages/board/board.js"></script>
        <script th:inline="javascript">
            var profilePhotoUrlPattern = /*[[${profilePhotoUrlPattern}]]*/ '';
            // 최상단 이동 플로팅 버튼
            (function() {
                const btn = document.getElementById('scrollTopBtn');
                window.addEventListener('scroll', function() {
                    const scrollY = window.scrollY || window.pageYOffset || 0;
                    if (scrollY > 300) {
                        btn.classList.add('scroll-top-btn--visible');
                    } else {
                        btn.classList.remove('scroll-top-btn--visible');
                    }
                }, { passive: true });
            })();

            function scrollToTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function toggleSearchPanel() {
                const panel = document.getElementById('searchPanel');
                const btn = document.getElementById('searchToggleBtn');
                const isOpen = panel.classList.toggle('search-panel--open');
                btn.classList.toggle('topbar__btn--active', isOpen);
                if (isOpen) {
                    setTimeout(function() {
                        document.getElementById('searchKeywordInput').focus();
                    }, 280);
                }
            }

            // 검색 중이면 패널 자동 오픈
            (function() {
                const keyword = /*[[${keyword}]]*/ null;
                if (keyword) {
                    const panel = document.getElementById('searchPanel');
                    const btn = document.getElementById('searchToggleBtn');
                    panel.classList.add('search-panel--open');
                    btn.classList.add('topbar__btn--active');
                }
            })();

            // PC 사이드바 top을 헤더 높이에 맞게 동적 조정
            (function() {
                var header = document.querySelector('.app-header');
                var sidebar = document.querySelector('.board-sidebar');
                if (!header || !sidebar) return;

                var gap = 16; // 헤더 하단 여백

                function updateSidebarTop() {
                    sidebar.style.top = (header.offsetHeight + gap) + 'px';
                }

                updateSidebarTop();

                if (window.ResizeObserver) {
                    new ResizeObserver(updateSidebarTop).observe(header);
                }
            })();

            function toggleCategoryMenu() {
                const menu = document.getElementById('categoryMenu');
                const overlay = document.getElementById('categoryMenuOverlay');

                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                    overlay.style.display = 'block';
                    document.body.style.overflow = 'hidden';
                } else {
                    menu.style.display = 'none';
                    overlay.style.display = 'none';
                    document.body.style.overflow = '';
                }
            }

            // 무한 스크롤 구현 (모바일)
            (function() {
                const categoryId = /*[[${selectedCategory?.id}]]*/ null;
                if (!categoryId) return;

                let currentPage = /*[[${boards.number}]]*/ 0;
                const totalPages = /*[[${boards.totalPages}]]*/ 1;
                const searchType = /*[[${searchType}]]*/ 'all';
                const keyword = /*[[${keyword}]]*/ null;
                let isLoading = false;

                // 모바일 여부 확인
                function isMobile() {
                    return window.innerWidth <= 768;
                }

                // 무한 스크롤 핸들러
                function handleInfiniteScroll() {
                    if (!isMobile()) return;
                    if (isLoading) return;
                    if (currentPage >= totalPages - 1) return;

                    const scrollPosition = window.innerHeight + (window.scrollY || window.pageYOffset || 0);
                    const threshold = document.documentElement.scrollHeight - 200;

                    if (scrollPosition >= threshold) {
                        loadMoreBoards();
                    }
                }

                // 다음 페이지 로드
                function loadMoreBoards() {
                    isLoading = true;
                    const loadingIndicator = document.querySelector('.loading-indicator');
                    if (loadingIndicator) loadingIndicator.style.display = 'block';

                    let apiUrl = '/board/api/boards?categoryId=' + categoryId + '&page=' + (currentPage + 1);
                    if (keyword) {
                        apiUrl += '&searchType=' + encodeURIComponent(searchType) + '&keyword=' + encodeURIComponent(keyword);
                    }
                    fetch(apiUrl)
                        .then(response => response.json())
                        .then(data => {
                            if (data.content && data.content.length > 0) {
                                const boardItems = document.getElementById('boardItems');
                                data.content.forEach(board => {
                                    const article = createBoardItem(board);
                                    boardItems.appendChild(article);
                                });
                                currentPage = data.currentPage;
                                loadProfilePhotos(boardItems);
                            }
                        })
                        .catch(error => console.error('Error loading boards:', error))
                        .finally(() => {
                            isLoading = false;
                            if (loadingIndicator) loadingIndicator.style.display = 'none';
                        });
                }

                // 날짜 포매팅 (yyyy-MM-dd HH:mm)
                function formatDate(dateStr) {
                    const d = new Date(dateStr);
                    const yyyy = d.getFullYear();
                    const MM = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    const HH = String(d.getHours()).padStart(2, '0');
                    const mm = String(d.getMinutes()).padStart(2, '0');
                    return `${yyyy}-${MM}-${dd} ${HH}:${mm}`;
                }

                // 게시글 아이템 생성
                function createBoardItem(board) {
                    const article = document.createElement('article');
                    article.className = 'board-item';
                    article.onclick = function() {
                        var url = '/board/' + board.id + '?categoryId=' + categoryId;
                        if (keyword) {
                            url += '&searchType=' + encodeURIComponent(searchType) + '&keyword=' + encodeURIComponent(keyword);
                        }
                        location.href = url + '&t=' + Date.now();
                    };

                    const createdAt = formatDate(board.createdAt);

                    const hasImage = board.content && board.content.includes('<img');
                    const hasAttachment = !!board.hasAttachment;
                    const isNewPost = window._atbRead && window._atbRead.isNewUnread(board.id, board.createdAtEpochMilli);
                    article.setAttribute('data-board-id', board.id);
                    article.setAttribute('data-created-at', board.createdAtEpochMilli || 0);
                    article.setAttribute('data-category-id', board.categoryId || '');
                    article.innerHTML = `
                        <div class="board-item__header">
                            <h2 class="board-item__title">
                                <span>${escapeHtml(board.title)}</span>
                                ${hasImage ? '<span class="board-item__img-badge" title="이미지 포함"><span class="ico ico--image" aria-hidden="true"></span></span>' : ''}
                                ${hasAttachment ? '<span class="board-item__attach-badge" title="첨부파일 있음"><span class="ico ico--attach" aria-hidden="true"></span></span>' : ''}
                                ${isNewPost ? '<span class="new-badge" style="display:inline;">N</span>' : '<span class="new-badge">N</span>'}
                            </h2>
                            <div class="board-item__meta">
                                ${profilePhotoUrlPattern ? `<span class="profile-avatar" data-photo-url="${profilePhotoUrlPattern.replace('{userId}', board.userId || '')}"><span class="profile-avatar__letter">${escapeHtml((board.authorNameOnly || board.authorName || '').charAt(0))}</span><img class="profile-avatar__img" alt="" /></span>` : ''}
                                <span class="board-item__author">${escapeHtml(board.authorName)}</span>
                                <span class="board-item__dot">·</span>
                                <time class="board-item__date">${createdAt}</time>
                            </div>
                        </div>
                        <p class="board-item__preview">${escapeHtml(abbreviate(stripHtml(board.content), 100))}</p>
                        <div class="board-item__footer">
                            <span class="${board.isLiked ? 'board-item__stat board-item__stat--liked' : 'board-item__stat'}">
                                <span class="${board.isLiked ? 'ico ico--heart' : 'ico ico--heart-outline'}" aria-hidden="true"></span>
                                <span>${board.likeCount || 0}</span>
                            </span>
                            <span class="${board.isCommented ? 'board-item__stat board-item__stat--commented' : 'board-item__stat'}">
                                <span class="ico ico--comment" aria-hidden="true"></span>
                                <span>${board.commentCount || 0}</span>
                            </span>
                            <span class="board-item__stat">
                                <span class="ico ico--view" aria-hidden="true"></span>
                                <span>${board.viewCount || 0}</span>
                            </span>
                        </div>
                    `;
                    return article;
                }

                function escapeHtml(text) {
                    const div = document.createElement('div');
                    div.textContent = text || '';
                    return div.innerHTML;
                }

                function abbreviate(text, maxLength) {
                    if (!text) return '';
                    if (text.length <= maxLength) return text;
                    return text.substring(0, maxLength - 3) + '...';
                }

                function stripHtml(html) {
                    if (!html) return '';
                    const div = document.createElement('div');
                    div.innerHTML = html;
                    return div.textContent || div.innerText || '';
                }

                // 스크롤 이벤트 리스너
                if (isMobile()) {
                    window.addEventListener('scroll', handleInfiniteScroll);
                }

                // 창 크기 변경 시 이벤트 리스너 재설정
                window.addEventListener('resize', function() {
                    if (isMobile()) {
                        window.addEventListener('scroll', handleInfiniteScroll);
                    } else {
                        window.removeEventListener('scroll', handleInfiniteScroll);
                    }
                });
            })();
        </script>
        <script th:inline="javascript">
            // N 배지 초기화
            (function() {
                var TTL = 24 * 60 * 60 * 1000;
                var newPostsByCategory = /*[[${newPostsByCategory}]]*/ {};

                function getReadSet() {
                    try { return JSON.parse(localStorage.getItem('atboard_read') || '{}'); }
                    catch(e) { return {}; }
                }

                function isNewUnread(id, ts) {
                    var readSet = getReadSet();
                    return (Date.now() - ts) < TTL && !readSet[String(id)];
                }

                // 무한스크롤에서도 사용할 수 있도록 전역 등록
                window._atbRead = {
                    isNewUnread: isNewUnread,
                    getReadSet: getReadSet
                };

                // 오래된 읽음 기록 정리 (48시간 초과)
                (function cleanup() {
                    try {
                        var readSet = getReadSet();
                        var cutoff = Date.now() - 2 * TTL;
                        var changed = false;
                        Object.keys(readSet).forEach(function(k) {
                            if (readSet[k] < cutoff) { delete readSet[k]; changed = true; }
                        });
                        if (changed) localStorage.setItem('atboard_read', JSON.stringify(readSet));
                    } catch(e) {}
                })();

                // 배지 표시/숨김을 매번 새로 계산 (bfcache 복원 시에도 호출됨)
                function applyBadges() {
                    var readSet = getReadSet();

                    // 게시글 N 배지
                    document.querySelectorAll('.board-item[data-board-id]').forEach(function(item) {
                        var id = item.getAttribute('data-board-id');
                        var ts = parseInt(item.getAttribute('data-created-at'), 10);
                        var badge = item.querySelector('.new-badge');
                        if (!badge) return;
                        badge.style.display = ((Date.now() - ts) < TTL && !readSet[id]) ? 'inline' : 'none';
                    });

                    // 게시판 N 배지 (사이드바 + 모바일 메뉴) — board-item 제외
                    document.querySelectorAll('[data-category-id]:not(.board-item)').forEach(function(el) {
                        var catId = el.getAttribute('data-category-id');
                        var postIds = newPostsByCategory[catId];
                        var badge = el.querySelector('.new-badge');
                        if (!badge) return;
                        var hasUnread = postIds && postIds.some(function(pid) { return !readSet[String(pid)]; });
                        badge.style.display = hasUnread ? 'inline' : 'none';
                    });
                }

                applyBadges();

                // 뒤로가기 등 bfcache 복원 시 재평가
                window.addEventListener('pageshow', function(e) {
                    if (e.persisted) applyBadges();
                });
            })();
        </script>
        <script>
        // 게시판 목록 작성자 프로필 사진 로드
        loadProfilePhotos();

        // 검색 히스토리
        (function() {
            var STORAGE_KEY = 'atboard_search_history';
            var MAX_ITEMS = 10;

            function getHistory() {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
                catch(e) { return []; }
            }
            function saveHistory(arr) {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
                catch(e) {}
            }
            function addToHistory(keyword) {
                if (!keyword || !keyword.trim()) return;
                keyword = keyword.trim();
                var arr = getHistory().filter(function(k) { return k !== keyword; });
                arr.unshift(keyword);
                if (arr.length > MAX_ITEMS) arr = arr.slice(0, MAX_ITEMS);
                saveHistory(arr);
            }
            function escapeAttr(str) {
                return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            }
            function escapeHtml(str) {
                var d = document.createElement('div'); d.textContent = str; return d.innerHTML;
            }

            function updatePanelHeight() {
                var panel = document.getElementById('searchPanel');
                if (panel && panel.classList.contains('search-panel--open')) {
                    panel.style.maxHeight = (panel.scrollHeight + 8) + 'px';
                }
            }

            function renderHistory() {
                var arr = getHistory();
                var container = document.getElementById('searchHistory');
                var list = document.getElementById('searchHistoryList');
                if (!container || !list) return;
                if (arr.length === 0) {
                    container.style.display = 'none';
                    updatePanelHeight();
                    return;
                }
                list.innerHTML = '';
                arr.forEach(function(keyword) {
                    var li = document.createElement('li');
                    li.className = 'search-history__item';
                    var ea = escapeAttr(keyword);
                    var eh = escapeHtml(keyword);
                    li.innerHTML =
                        '<button type="button" class="search-history__keyword-btn" data-kw="' + ea + '">' +
                            '<span class="search-history__ico">⏱</span>' +
                            '<span class="search-history__keyword-text">' + eh + '</span>' +
                        '</button>' +
                        '<button type="button" class="search-history__fill-btn" data-kw="' + ea + '" title="입력창에 채우기">↵</button>' +
                        '<button type="button" class="search-history__del-btn" data-kw="' + ea + '" title="삭제">&times;</button>';
                    list.appendChild(li);
                });
                container.style.display = 'block';
                updatePanelHeight();
            }

            // 히스토리 목록 클릭 이벤트
            document.getElementById('searchHistoryList').addEventListener('click', function(e) {
                var keywordBtn = e.target.closest('.search-history__keyword-btn');
                var fillBtn    = e.target.closest('.search-history__fill-btn');
                var delBtn     = e.target.closest('.search-history__del-btn');
                if (keywordBtn) {
                    var kw = keywordBtn.getAttribute('data-kw');
                    addToHistory(kw);
                    document.getElementById('searchKeywordInput').value = kw;
                    document.querySelector('.search-form').submit();
                } else if (fillBtn) {
                    var kw = fillBtn.getAttribute('data-kw');
                    var input = document.getElementById('searchKeywordInput');
                    input.value = kw;
                    input.focus();
                    input.setSelectionRange(kw.length, kw.length);
                } else if (delBtn) {
                    var kw = delBtn.getAttribute('data-kw');
                    saveHistory(getHistory().filter(function(k) { return k !== kw; }));
                    renderHistory();
                }
            });

            // 검색 폼 제출 시 히스토리 저장
            document.querySelector('.search-form').addEventListener('submit', function() {
                var keyword = document.getElementById('searchKeywordInput').value;
                addToHistory(keyword);
            });

            // toggleSearchPanel 오버라이드: 열릴 때 키워드 없을 때만 히스토리 표시
            var _origToggleSearch = window.toggleSearchPanel;
            window.toggleSearchPanel = function() {
                var panel = document.getElementById('searchPanel');
                var wasOpen = panel.classList.contains('search-panel--open');
                if (!wasOpen) {
                    var kw = document.getElementById('searchKeywordInput').value;
                    if (!kw || !kw.trim()) renderHistory();
                    _origToggleSearch();
                    panel.style.maxHeight = (panel.scrollHeight + 8) + 'px';
                } else {
                    panel.style.maxHeight = '';
                    _origToggleSearch();
                }
            };

            // 입력창 클릭 or 입력 시 히스토리 표시
            var searchInput = document.getElementById('searchKeywordInput');
            searchInput.addEventListener('focus', renderHistory);
            searchInput.addEventListener('input', renderHistory);

            window.clearAllSearchHistory = function() {
                saveHistory([]);
                renderHistory();
            };

            window.closeSearchHistory = function() {
                var container = document.getElementById('searchHistory');
                if (container) container.style.display = 'none';
                updatePanelHeight();
            };

            // 검색 결과 표시 중(키워드 있음)에는 히스토리 숨김, 없으면 표시
            if (document.getElementById('searchPanel').classList.contains('search-panel--open')) {
                var initKw = document.getElementById('searchKeywordInput').value;
                if (!initKw || !initKw.trim()) {
                    renderHistory();
                    var panel = document.getElementById('searchPanel');
                    panel.style.maxHeight = (panel.scrollHeight + 8) + 'px';
                }
            }
        })();

        // 사이드바 프로필 사진 로드 (1초 타임아웃, 실패 시 글자 아바타 유지)
        (function() {
            document.querySelectorAll('.board-sidebar__avatar[data-photo-url]').forEach(function(avatar) {
                var url = avatar.getAttribute('data-photo-url');
                if (!url) return;
                var img = avatar.querySelector('.board-sidebar__avatar-img');
                if (!img) return;
                var done = false;
                var timer = setTimeout(function() {
                    if (done) return;
                    done = true;
                    img.onload = null;
                    img.onerror = null;
                    img.src = '';
                }, 1000);
                img.onload = function() {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    img.style.display = 'block';
                };
                img.onerror = function() {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                };
                img.src = url;
            });
        })();
        </script>
    </th:block>
</body>
