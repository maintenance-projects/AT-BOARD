<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{core/layout :: layout('글쓰기', ~{::pageHeader}, ~{::pageBody}, ~{::pageHead}, ~{::pageScripts})}">

<head>
    <th:block th:fragment="pageHead">
        <link rel="stylesheet" href="/pages/board/board.css" />
        <!-- Quill 에디터 CSS -->
        <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    </th:block>
</head>

<body>
    <th:block th:fragment="pageHeader">
        <div class="topbar topbar--center">
            <div class="topbar__spacer"></div>
            <h1 class="topbar__title">글쓰기</h1>
            <div class="topbar__spacer"></div>
        </div>
    </th:block>

    <th:block th:fragment="pageBody">
        <main class="page board-write-page">
            <form action="/board/write" method="post" id="writeForm" class="board-form">
                <div class="form-group">
                    <select
                        id="categoryId"
                        name="categoryId"
                        class="form-input"
                        required
                    >
                        <option value="">게시판 선택</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${selectedCategoryId != null && selectedCategoryId == category.id}">게시판</option>
                    </select>
                </div>

                <div class="form-group">
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-input"
                        placeholder="제목을 입력하세요"
                        required
                        maxlength="100"
                    />
                </div>

                <div class="form-group form-group--flex">
                    <!-- Quill 에디터 -->
                    <div id="editor" class="quill-editor"></div>
                    <!-- 숨겨진 textarea에 실제 내용 저장 -->
                    <textarea
                        id="content"
                        name="content"
                        style="display: none;"
                    ></textarea>
                </div>

                <div class="board-form-bottom">
                    <!-- 첨부파일 영역 -->
                    <div class="form-group">
                        <div class="attachment-zone" id="attachmentZone">
                            <span class="attachment-zone__icon">📎</span>
                            <span class="attachment-zone__text attachment-zone__text--pc">파일을 드래그하거나 클릭하여 첨부하세요</span>
                            <span class="attachment-zone__text attachment-zone__text--mobile">이 곳을 클릭하여 첨부하세요.</span>
                            <span class="attachment-zone__hint">실행파일(.exe, .sh, .bat 등) 제외, 파일당 최대 <span th:text="${maxAttachmentSizeMb}">50</span>MB</span>
                            <input type="file" id="attachmentInput" multiple style="display:none;" />
                        </div>
                        <div class="attachment-list-header attachment-list-header--hidden" id="attachmentListHeader">
                            <span class="attachment-list-header__count">첨부파일 <span id="attachmentCount">0</span>개</span>
                            <button type="button" class="attachment-accordion-btn" onclick="toggleAttachmentList()">
                                <span class="attachment-accordion-chevron"></span>
                            </button>
                        </div>
                        <div class="attachment-list" id="attachmentList"></div>
                    </div>

                    <div class="form-actions">
                        <button type="button" onclick="history.back()" class="btn btn--secondary">취소</button>
                        <button type="submit" class="btn btn--primary">등록</button>
                    </div>
                </div>
            </form>
        </main>
    </th:block>

    <th:block th:fragment="pageScripts">
        <!-- Quill 에디터 JS -->
        <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
        <script>
            // 페이지 로드 시 키보드 없는 상태의 viewport 높이 저장 (isKeyboardUp 기준)
            var _baseVvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            var _resetHeightTimer = null;

            // 모바일: 헤더 숨기기
            function hideWritePageHeader() {
                if (window.innerWidth >= 1024) return;
                var appHeader = document.querySelector('.app-header');
                if (appHeader) appHeader.classList.remove('--header-visible');
            }

            // 모바일: 키보드 등장 시 에디터 하단이 키보드 상단에 맞춰지도록 높이 설정
            function adjustEditorHeight() {
                if (window.innerWidth >= 1024) return;
                var vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                var isKeyboardUp = _baseVvh - vvh > 150;
                var editorContainer = document.querySelector('.board-write-page .form-group--flex');
                if (!editorContainer) return;
                if (isKeyboardUp) {
                    // 키보드 올라올 때: 예약된 리셋 취소 후 즉시 높이 설정
                    if (_resetHeightTimer) { clearTimeout(_resetHeightTimer); _resetHeightTimer = null; }
                    hideWritePageHeader();
                    var top = editorContainer.getBoundingClientRect().top;
                    var maxH = vvh - top - 5;
                    if (maxH > 100) {
                        editorContainer.style.height = maxH + 'px';
                        editorContainer.style.flex = 'none';
                    }
                } else {
                    // 키보드 내려갈 때: 키보드 애니메이션 후 높이 리셋 (하단 바 점프 방지)
                    var capturedVvh = vvh;
                    _resetHeightTimer = setTimeout(function() {
                        editorContainer.style.height = '';
                        editorContainer.style.flex = '';
                        _baseVvh = capturedVvh;
                        _resetHeightTimer = null;
                    }, 250);
                }
            }

            // 이미지 리사이즈 핸들러
            function initImageResize(quill) {
                var container = quill.root.parentElement;
                var editorEl  = quill.root;
                var overlay = null, activeImg = null, startX, startW;

                function showOverlay(img) {
                    removeOverlay();
                    activeImg = img;
                    overlay = document.createElement('div');
                    overlay.style.cssText = 'position:absolute;box-sizing:border-box;border:2px solid #3498db;pointer-events:none;z-index:100;';
                    var handle = document.createElement('div');
                    handle.title = '드래그하여 크기 조절';
                    handle.setAttribute('tabindex', '0');
                    handle.style.cssText = 'position:absolute;right:-10px;bottom:-10px;width:20px;height:20px;background:#3498db;cursor:se-resize;pointer-events:all;border-radius:3px;touch-action:none;';
                    overlay.appendChild(handle);
                    container.appendChild(overlay);
                    updateOverlay();
                    handle.addEventListener('mousedown', onMouseDown);
                    handle.addEventListener('touchstart', onTouchStart, { passive: false });
                    setTimeout(function() {
                        handle.focus(); // 크기조절 핸들로 포커스 이동
                    }, 0);
                }

                function updateOverlay() {
                    if (!activeImg || !overlay) return;
                    var cRect = container.getBoundingClientRect();
                    var iRect = activeImg.getBoundingClientRect();
                    overlay.style.left   = (iRect.left - cRect.left) + 'px';
                    overlay.style.top    = (iRect.top  - cRect.top)  + 'px';
                    overlay.style.width  = iRect.width  + 'px';
                    overlay.style.height = iRect.height + 'px';
                }

                function removeOverlay() {
                    if (overlay) { overlay.remove(); overlay = null; }
                    activeImg = null;
                }

                // 방법 1: 에디터 스크롤 시 오버레이 재동기화 + 헤더 숨김
                editorEl.addEventListener('scroll', function() {
                    updateOverlay();
                    if (window.innerWidth < 1024) {
                        var cur = editorEl.scrollTop;
                        var vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                        var isKeyboardUp = _baseVvh - vvh > 150;
                        var appHeader = document.querySelector('.app-header');
                        if (appHeader && (cur > 0 || isKeyboardUp)) {
                            appHeader.classList.remove('--header-visible');
                        }
                    }
                });
                // 방법 1: 키보드 올라오거나 내려갈 때 오버레이 재동기화 + 커서 위치 보정
                if (window.visualViewport) {
                    window.visualViewport.addEventListener('resize', function() {
                        updateOverlay();
                        adjustEditorHeight(); // 에디터 높이 키보드 상단에 맞춤
                        // 키보드로 가려지지 않는 에디터 영역 기준으로 커서 보정
                        setTimeout(function() {
                            var sel = quill.getSelection();
                            if (!sel) return;
                            try {
                                var bounds = quill.getBounds(sel.index);
                                var vvh = window.visualViewport.height;
                                var editorTop = editorEl.getBoundingClientRect().top;
                                var visibleH = Math.max(50, vvh - editorTop);
                                var st = editorEl.scrollTop;
                                if (bounds.bottom > st + visibleH) {
                                    editorEl.scrollTop = bounds.bottom - visibleH + 20;
                                } else if (bounds.top < st) {
                                    editorEl.scrollTop = Math.max(0, bounds.top - 20);
                                }
                            } catch (e) {}
                        }, 100);
                    });
                    // visual viewport 스크롤 시에도 재계산 (헤더 복귀 등 레이아웃 변동 대응)
                    window.visualViewport.addEventListener('scroll', function() {
                        updateOverlay();
                        adjustEditorHeight();
                    });
                }

                function onMouseDown(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.clientX;
                    startW = activeImg.getBoundingClientRect().width;
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                }

                function onMouseMove(e) {
                    var newW = Math.max(50, startW + (e.clientX - startX));
                    activeImg.style.width  = newW + 'px';
                    activeImg.style.height = 'auto';
                    updateOverlay();
                }

                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }

                function onTouchStart(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    startX = e.touches[0].clientX;
                    startW = activeImg.getBoundingClientRect().width;
                    // 방법 3: 리사이즈 중 에디터 스크롤 잠금 (오버레이 틀어짐 방지)
                    editorEl.style.overflowY = 'hidden';
                    document.addEventListener('touchmove', onTouchMove, { passive: false });
                    document.addEventListener('touchend', onTouchEnd);
                }

                function onTouchMove(e) {
                    e.preventDefault();
                    var newW = Math.max(50, startW + (e.touches[0].clientX - startX));
                    activeImg.style.width  = newW + 'px';
                    activeImg.style.height = 'auto';
                    updateOverlay();
                }

                function onTouchEnd() {
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                    // 방법 3: 스크롤 복원 + 위치 재동기화
                    editorEl.style.overflowY = '';
                    updateOverlay();
                }

                // 스크롤 감지용 시작 좌표 추적
                var _touchStartX = 0, _touchStartY = 0;
                editorEl.addEventListener('touchstart', function(e) {
                    _touchStartX = e.touches[0].clientX;
                    _touchStartY = e.touches[0].clientY;
                }, { passive: true });

                // 모바일: 이미지 탭 시 커서 이동 + 크기조절 프레임 표시 (키보드 방지)
                // elementFromPoint로 실제 시각 좌표 기준 타겟 판별 (iOS scroll 오탐 방지)
                editorEl.addEventListener('touchend', function(e) {
                    var touch = e.changedTouches[0];
                    var actualTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (actualTarget && actualTarget.tagName === 'IMG' && editorEl.contains(actualTarget)) {
                        var dx = Math.abs(touch.clientX - _touchStartX);
                        var dy = Math.abs(touch.clientY - _touchStartY);
                        if (dx > 10 || dy > 10) return; // 스크롤 중 이미지에 닿은 경우 무시
                        e.preventDefault(); // 합성 click·focus 이벤트 방지
                        quill.blur(); // 키보드 내리기
                        // 키보드 내려가고 레이아웃 안정 후 이미지 하단이 보이도록 스크롤 → 오버레이 표시
                        var tappedImg = actualTarget;
                        setTimeout(function() {
                            var imgRect = tappedImg.getBoundingClientRect();
                            var editorRect = editorEl.getBoundingClientRect();
                            var imgTop    = imgRect.top    - editorRect.top + editorEl.scrollTop;
                            var imgBottom = imgRect.bottom - editorRect.top + editorEl.scrollTop;
                            var viewTop    = editorEl.scrollTop;
                            var viewBottom = editorEl.scrollTop + editorEl.clientHeight;
                            if (imgBottom > viewBottom) {
                                editorEl.scrollTop = imgBottom - editorEl.clientHeight + 20;
                            } else if (imgTop < viewTop) {
                                editorEl.scrollTop = Math.max(0, imgTop - 20);
                            }
                            showOverlay(tappedImg);
                        }, 600);
                    }
                }, { passive: false });

                // PC: 마우스 클릭 처리 / 텍스트 클릭 시 입력커서 포커스
                // elementFromPoint로 실제 시각 좌표 기준 타겟 판별 (iOS scroll 오탐 방지)
                // quill.focus() 미사용: Quill이 마지막 cursor position 복원 → 탭 위치 무시되는 문제 방지
                editorEl.addEventListener('click', function(e) {
                    var actualTarget = document.elementFromPoint(e.clientX, e.clientY) || e.target;
                    if (actualTarget.tagName === 'IMG' && editorEl.contains(actualTarget)) {
                        // 모바일은 touchend에서 처리됨 (preventDefault로 click 미발생)
                        // PC 마우스 클릭 처리
                        var blot = Quill.find(actualTarget);
                        if (blot) {
                            quill.setSelection(quill.getIndex(blot) + 1, 0, 'user');
                        }
                        showOverlay(actualTarget);
                    } else if (!overlay || !overlay.contains(actualTarget)) {
                        removeOverlay();
                        // 브라우저의 자연스러운 click → contenteditable 포커스 + 커서 배치에 맡김
                    }
                });

                document.addEventListener('click', function(e) {
                    if (!overlay) return;
                    if (!container.contains(e.target)) removeOverlay();
                });
            }

            // Quill 에디터 초기화
            const quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: '내용을 입력하세요...',
                modules: {
                    toolbar: {
                        container: [
                            [{ 'header': [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'color': [] }, { 'background': [] }],
                            ['link', 'image'],
                            ['clean']
                        ],
                        handlers: {
                            image: imageHandler
                        }
                    }
                }
            });

            initImageResize(quill);

            // 초기 헤더 상태: 페이지 진입 시 표시
            if (window.innerWidth < 1024) {
                var initHeader = document.querySelector('.app-header');
                if (initHeader) initHeader.classList.add('--header-visible');
            }

            // 제목 입력 후 Enter → 내용 입력 영역으로 포커스 이동
            document.getElementById('title').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    quill.focus();
                }
            });

            // 안드로이드 WebView 키보드 대응: 에디터 포커스 시 툴바가 보이도록 스크롤
            // (CSS sticky로 1차 대응, scrollIntoView로 2차 보정)
            quill.root.addEventListener('focus', function() {
                if (window.innerWidth >= 1024) return;
                setTimeout(function() {
                    var toolbar = document.querySelector('.ql-toolbar');
                    if (toolbar) toolbar.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 400);
            });

            // data URL → File 매핑 (폼 제출 시 서버 업로드)
            // Quill 1.x는 blob: URL을 보안상 차단하므로 FileReader로 data URL 사용
            var pendingImages = []; // [{ dataUrl, file }]

            // 이미지 핸들러: 선택 시 data URL로 즉시 미리보기, 서버 업로드는 폼 제출 시
            function imageHandler() {
                var input = document.createElement('input');
                input.setAttribute('type', 'file');
                input.setAttribute('accept', 'image/*');
                input.click();

                input.onchange = function() {
                    var file = input.files[0];
                    if (!file) return;
                    if (file.size > 10 * 1024 * 1024) {
                        alert('파일 크기는 10MB를 초과할 수 없습니다.');
                        return;
                    }
                    if (!file.type.match(/image\/(jpeg|png|gif|webp)/)) {
                        alert('JPG, PNG, GIF, WEBP 파일만 업로드 가능합니다.');
                        return;
                    }
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var dataUrl = e.target.result;
                        pendingImages.push({ dataUrl: dataUrl, file: file });
                        var range = quill.getSelection(true);
                        quill.insertEmbed(range.index, 'image', dataUrl);
                        quill.setSelection(range.index + 1, 0, 'user');
                        // 이미지 아랫부분으로 스크롤
                        var bounds = quill.getBounds(range.index);
                        var imgBottom = bounds.top + bounds.height;
                        var editorHeight = quill.root.clientHeight;
                        if (imgBottom > quill.root.scrollTop + editorHeight) {
                            quill.root.scrollTop = imgBottom - editorHeight + 20;
                        }
                    };
                    reader.readAsDataURL(file);
                };
            }

            // 에디터 내 data URL 이미지를 서버에 업로드하고 URL 교체
            function uploadPendingImages() {
                var imgs = quill.root.querySelectorAll('img');
                var toUpload = [];
                imgs.forEach(function(img) {
                    if (img.src.indexOf('data:') === 0) {
                        var entry = null;
                        for (var i = 0; i < pendingImages.length; i++) {
                            if (pendingImages[i].dataUrl === img.src) { entry = pendingImages[i]; break; }
                        }
                        if (entry) toUpload.push({ img: img, file: entry.file, dataUrl: entry.dataUrl });
                    }
                });
                if (toUpload.length === 0) return Promise.resolve();

                var promise = Promise.resolve();
                toUpload.forEach(function(item) {
                    promise = promise.then(function() {
                        var formData = new FormData();
                        formData.append('file', item.file);
                        return fetch('/api/upload/image', { method: 'POST', body: formData })
                            .then(function(res) { return res.json(); })
                            .then(function(data) {
                                if (data.url) {
                                    item.img.setAttribute('src', data.url);
                                    pendingImages = pendingImages.filter(function(p) { return p.dataUrl !== item.dataUrl; });
                                } else {
                                    throw new Error(data.error || '이미지 업로드 실패');
                                }
                            });
                    });
                });
                return promise;
            }

        </script>

        <!-- 첨부파일 + 폼 제출 스크립트 -->
        <script th:inline="javascript">
            // 모바일 첨부파일 목록 아코디언
            function updateAttachmentAccordion() {
                if (window.innerWidth >= 1024) return;
                var header = document.getElementById('attachmentListHeader');
                var list = document.getElementById('attachmentList');
                var countEl = document.getElementById('attachmentCount');
                if (!header || !list || !countEl) return;
                var count = list.querySelectorAll('.attachment-item').length;
                countEl.textContent = count;
                if (count > 0) {
                    header.classList.remove('attachment-list-header--hidden');
                } else {
                    header.classList.add('attachment-list-header--hidden');
                    header.classList.remove('--collapsed');
                    list.classList.remove('--collapsed');
                }
            }
            function toggleAttachmentList() {
                var header = document.getElementById('attachmentListHeader');
                var list = document.getElementById('attachmentList');
                if (!header || !list) return;
                var isCollapsed = header.classList.toggle('--collapsed');
                list.classList.toggle('--collapsed', isCollapsed);
            }

            (function() {
                var maxSizeMb = /*[[${maxAttachmentSizeMb}]]*/ 50;
                var maxSizeBytes = maxSizeMb * 1024 * 1024;
                var blockedExtensions = (/*[[${blockedExtensionsStr}]]*/ 'exe,sh,bat').split(',').map(function(e) { return e.trim(); });
                var retentionRules = /*[[${retentionRules}]]*/ [];

                function calcExpiresAt(fileSizeBytes) {
                    var fileSizeMb = Math.floor(fileSizeBytes / (1024 * 1024));
                    var applicable = null;
                    for (var i = 0; i < retentionRules.length; i++) {
                        var rule = retentionRules[i];
                        if (fileSizeMb >= rule.sizeThresholdMb) {
                            if (applicable === null || rule.sizeThresholdMb > applicable.sizeThresholdMb) {
                                applicable = rule;
                            }
                        }
                    }
                    if (!applicable || applicable.retentionDays <= 0) return null;
                    var d = new Date();
                    d.setDate(d.getDate() + applicable.retentionDays);
                    return d.toISOString().slice(0, 10);
                }

                var zone = document.getElementById('attachmentZone');
                var input = document.getElementById('attachmentInput');
                var list = document.getElementById('attachmentList');
                var form = document.getElementById('writeForm');
                var pendingFiles = [];

                zone.addEventListener('click', function() { input.click(); });
                input.addEventListener('change', function() { handleFiles(input.files); input.value = ''; });

                zone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    zone.classList.add('attachment-zone--drag-over');
                });
                zone.addEventListener('dragleave', function() {
                    zone.classList.remove('attachment-zone--drag-over');
                });
                zone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    zone.classList.remove('attachment-zone--drag-over');
                    handleFiles(e.dataTransfer.files);
                });

                function handleFiles(files) {
                    Array.from(files).forEach(function(file) { addPendingFile(file); });
                }

                function formatFileSize(bytes) {
                    if (bytes < 1024) return bytes + ' B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
                }

                function addPendingFile(file) {
                    var dotIdx = file.name.lastIndexOf('.');
                    if (dotIdx >= 0) {
                        var ext = file.name.substring(dotIdx + 1).toLowerCase();
                        if (blockedExtensions.indexOf(ext) >= 0) {
                            alert('업로드할 수 없는 파일 형식입니다: .' + ext);
                            return;
                        }
                    }
                    if (file.size > maxSizeBytes) {
                        alert('파일 크기는 ' + maxSizeMb + 'MB를 초과할 수 없습니다.\n(선택 파일: ' + (file.size / 1024 / 1024).toFixed(1) + 'MB)');
                        return;
                    }

                    var item = document.createElement('div');
                    item.className = 'attachment-item';

                    var nameSpan = document.createElement('span');
                    nameSpan.className = 'attachment-item__name';
                    nameSpan.textContent = file.name;

                    var sizeSpan = document.createElement('span');
                    sizeSpan.className = 'attachment-item__size';
                    sizeSpan.textContent = formatFileSize(file.size);

                    var progressDiv = document.createElement('div');
                    progressDiv.className = 'attachment-item__progress';
                    var progressBar = document.createElement('div');
                    progressBar.className = 'attachment-item__progress-bar';
                    progressDiv.appendChild(progressBar);

                    var pctSpan = document.createElement('span');
                    pctSpan.className = 'attachment-item__pct';

                    var removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.className = 'attachment-item__remove';
                    removeBtn.textContent = '×';
                    removeBtn.addEventListener('click', function() {
                        pendingFiles = pendingFiles.filter(function(pf) { return pf.item !== item; });
                        item.remove();
                        updateAttachmentAccordion();
                    });

                    item.appendChild(nameSpan);
                    item.appendChild(sizeSpan);
                    var expiresAt = calcExpiresAt(file.size);
                    if (expiresAt) {
                        var expirySpan = document.createElement('span');
                        expirySpan.className = 'attachment-expiry-info';
                        expirySpan.textContent = '~' + expiresAt;
                        item.appendChild(expirySpan);
                    }
                    item.appendChild(progressDiv);
                    item.appendChild(pctSpan);
                    item.appendChild(removeBtn);
                    list.appendChild(item);
                    updateAttachmentAccordion();

                    pendingFiles.push({ file: file, item: item, nameSpan: nameSpan, sizeSpan: sizeSpan, progressDiv: progressDiv, progressBar: progressBar, pctSpan: pctSpan, removeBtn: removeBtn });
                }

                function uploadWithProgress(pf) {
                    return new Promise(function(resolve, reject) {
                        var xhr = new XMLHttpRequest();
                        var formData = new FormData();
                        formData.append('file', pf.file);

                        pf.nameSpan.style.flex = '0 0 auto';
                        pf.nameSpan.style.maxWidth = '50%';
                        pf.sizeSpan.style.display = 'none';
                        pf.progressDiv.style.display = 'flex';
                        pf.pctSpan.style.display = 'inline';
                        pf.removeBtn.style.display = 'none';
                        pf.progressBar.style.width = '0%';
                        pf.pctSpan.textContent = '0%';

                        xhr.upload.addEventListener('progress', function(e) {
                            if (e.lengthComputable) {
                                var pct = Math.round(e.loaded / e.total * 100);
                                pf.progressBar.style.width = pct + '%';
                                pf.pctSpan.textContent = pct + '%';
                            }
                        });

                        xhr.addEventListener('load', function() {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                try {
                                    var data = JSON.parse(xhr.responseText);
                                    if (data.error) { reject(data.error); return; }
                                    pf.progressBar.style.width = '100%';
                                    pf.pctSpan.textContent = '100%';
                                    resolve(data);
                                } catch(ex) { reject('서버 응답 오류'); }
                            } else {
                                try { reject(JSON.parse(xhr.responseText).error || '업로드 실패'); }
                                catch(ex) { reject('업로드 실패 (' + xhr.status + ')'); }
                            }
                        });

                        xhr.addEventListener('error', function() { reject('네트워크 오류'); });
                        xhr.open('POST', '/api/upload/attachment');
                        xhr.send(formData);
                    });
                }

                function restoreItem(pf) {
                    pf.nameSpan.style.flex = '';
                    pf.nameSpan.style.maxWidth = '';
                    pf.sizeSpan.style.display = '';
                    pf.progressDiv.style.display = 'none';
                    pf.pctSpan.style.display = 'none';
                    pf.removeBtn.style.display = '';
                }

                // 폼 제출: Quill 검증 → 이미지 업로드 → 첨부파일 업로드 → 제출
                form.addEventListener('submit', function(e) {
                    e.preventDefault();

                    var contentEl = document.getElementById('content');
                    contentEl.value = quill.root.innerHTML;
                    if (quill.getText().trim().length === 0) {
                        alert('내용을 입력하세요.');
                        return;
                    }

                    var submitBtn = form.querySelector('[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.textContent = '등록 중...';

                    // 1단계: 에디터 이미지 서버 업로드 (blob URL → 서버 URL 교체)
                    uploadPendingImages()
                        .then(function() {
                            contentEl.value = quill.root.innerHTML;

                            // 2단계: 첨부파일 순차 업로드
                            var snapshot = pendingFiles.slice();
                            var attachmentIds = [];
                            var idx = 0;

                            function uploadNext() {
                                if (idx >= snapshot.length) {
                                    attachmentIds.forEach(function(id) {
                                        var hidden = document.createElement('input');
                                        hidden.type = 'hidden';
                                        hidden.name = 'attachmentIds';
                                        hidden.value = id;
                                        form.appendChild(hidden);
                                    });
                                    form.submit();
                                    return;
                                }
                                var pf = snapshot[idx++];
                                uploadWithProgress(pf)
                                    .then(function(data) {
                                        attachmentIds.push(data.id);
                                        pf.nameSpan.style.flex = '';
                                        pf.nameSpan.style.maxWidth = '';
                                        pf.sizeSpan.style.display = '';
                                        pf.progressDiv.style.display = 'none';
                                        pf.pctSpan.style.display = 'none';
                                        pf.removeBtn.style.display = '';
                                        uploadNext();
                                    })
                                    .catch(function(err) {
                                        alert(pf.file.name + ' 업로드 실패: ' + err);
                                        restoreItem(pf);
                                        submitBtn.disabled = false;
                                        submitBtn.textContent = '등록';
                                    });
                            }

                            uploadNext();
                        })
                        .catch(function(err) {
                            alert('이미지 업로드 실패: ' + err);
                            submitBtn.disabled = false;
                            submitBtn.textContent = '등록';
                        });
                });
            })();
        </script>
    </th:block>
</body>

</html>
